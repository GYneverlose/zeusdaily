name: Generate Zeus Daily

on:
  schedule:
    # Every day at 7:00 AM Malaysia time (MYT = UTC+8, so 23:00 UTC previous day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Generate today's edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config --global user.name "Zeus Daily Bot"
          git config --global user.email "bot@zeusdaily.blog"
          git add .
          git diff --staged --quiet || git commit -m "📰 Zeus Daily $(date +'%Y-%m-%d')"
          git push
