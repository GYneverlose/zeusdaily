<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Daily · The God's Eye View</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #b8964a;
  --gold-light: #d4aa60;
  --gold-dark: #8a6d2f;
  --purple: #5c3d8f;
  --purple-light: #8b5cf6;
  --purple-deep: #2d1b4e;
  --cream: #faf8f4;
  --parchment: #f2ead8;
  --parchment-dark: #e8dcc0;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: #06020f;
  font-family: 'Cormorant Garamond', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ======================== STORM BACKGROUND ======================== */
.storm {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Deep nebula — darker to contrast with scroll */
.nebula {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(35,10,70,0.85) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(20,5,50,0.9) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(8,2,20,1) 0%, #03010a 70%);
}

/* Stars */
.stars {
  position: absolute;
  inset: 0;
}

/* Lightning bolts - SVG animated */
.lightning-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Ambient glow pools */
.glow-pool {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: breathe 4s ease-in-out infinite;
}
.glow-pool-1 {
  width: 500px; height: 300px;
  top: -80px; left: -100px;
  background: rgba(92,61,143,0.35);
  animation-delay: 0s;
}
.glow-pool-2 {
  width: 400px; height: 400px;
  bottom: -100px; right: -80px;
  background: rgba(60,30,120,0.3);
  animation-delay: 1.5s;
}
.glow-pool-3 {
  width: 300px; height: 200px;
  top: 40%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(139,92,246,0.15);
  animation-delay: 0.8s;
}

@keyframes breathe {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}

/* Floating particles */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: drift linear infinite;
}

@keyframes drift {
  0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-100px) translateX(var(--dx)) scale(1.2); opacity: 0; }
}

/* ======================== LIGHTNING ======================== */
.bolt {
  position: absolute;
  top: 0;
  opacity: 0;
  filter: blur(0.5px);
  animation: flash-bolt var(--dur) ease-out var(--delay) infinite;
}

@keyframes flash-bolt {
  0% { opacity: 0; }
  2% { opacity: 1; filter: drop-shadow(0 0 12px #a78bfa) drop-shadow(0 0 30px #7c3aed); }
  4% { opacity: 0.3; }
  5% { opacity: 0.9; }
  8% { opacity: 0; }
  100% { opacity: 0; }
}

/* Screen flash */
.screen-flash {
  position: fixed;
  inset: 0;
  background: rgba(139,92,246,0.08);
  pointer-events: none;
  z-index: 1;
  animation: screen-flicker 7s ease-in-out infinite;
}

@keyframes screen-flicker {
  0%, 100% { opacity: 0; }
  14% { opacity: 1; }
  14.5% { opacity: 0; }
  15% { opacity: 0.6; }
  15.8% { opacity: 0; }
  41% { opacity: 0; }
  41.3% { opacity: 0.8; }
  41.9% { opacity: 0; }
}

/* ======================== SCROLL / PARCHMENT ======================== */
.scroll-wrapper {
  position: relative;
  z-index: 10;
  animation: float 6s ease-in-out infinite, fadeIn 1.2s ease both;
  filter:
    drop-shadow(0 0 1px rgba(184,150,74,0.6))
    drop-shadow(0 20px 60px rgba(30,10,80,0.95))
    drop-shadow(0 0 100px rgba(92,61,143,0.5));
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(-0.3deg); }
  33% { transform: translateY(-12px) rotate(0.2deg); }
  66% { transform: translateY(-6px) rotate(-0.15deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ======================== SCROLL — PARCHMENT + DARK EBONY RODS ======================== */

/* END CAPS — dark polished ebony/lacquer, creates frame around bright parchment */
.scroll-cap {
  width: 280px;
  height: 28px;
  border-radius: 14px;
  position: relative;
  z-index: 2;
  background: linear-gradient(180deg,
    rgba(120,100,160,0.6) 0%,
    #2a1e3e 5%,
    #1e1530 25%,
    #140f22 50%,
    #0e0a18 75%,
    #08060f 100%
  );
  box-shadow:
    0 10px 40px rgba(0,0,0,0.9),
    0 2px 0 rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(180,150,255,0.3),
    inset 0 -1px 0 rgba(0,0,0,0.8);
  overflow: visible;
}

/* Gold engraved groove on cap */
.scroll-cap::before {
  content: '';
  position: absolute;
  left: 18px; right: 18px;
  top: 36%; height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(184,150,74,0.4) 10%,
    rgba(220,185,100,0.85) 50%,
    rgba(184,150,74,0.4) 90%,
    transparent);
  box-shadow: 0 0 6px rgba(200,165,80,0.35);
}

.scroll-cap::after {
  content: '';
  position: absolute;
  left: 28px; right: 28px;
  top: 62%; height: 1px;
  background: linear-gradient(90deg,
    transparent, rgba(139,92,246,0.4), rgba(184,150,74,0.3), rgba(139,92,246,0.4), transparent);
}

/* Knobs — dark ebony pillars with gold band */
.scroll-cap-inner {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  pointer-events: none;
}

.scroll-knob {
  width: 17px; height: 46px;
  border-radius: 9px;
  background: linear-gradient(90deg,
    rgba(140,120,200,0.35) 0%,
    #2a1e3e 6%,
    #1a1228 28%,
    #100c1e 55%,
    #080612 80%,
    #040308 100%
  );
  box-shadow:
    4px 0 16px rgba(0,0,0,0.9),
    -1px 0 4px rgba(0,0,0,0.6),
    inset 1px 0 0 rgba(160,130,220,0.2);
  position: relative;
  z-index: 3;
  margin: 0 -9px;
}

.scroll-knob::before {
  content: '';
  position: absolute;
  left: 2px; right: 2px;
  top: 33%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(220,185,100,0.9), transparent);
  border-radius: 1px;
  box-shadow: 0 0 4px rgba(200,165,80,0.5);
}
.scroll-knob::after {
  content: '';
  position: absolute;
  left: 2px; right: 2px;
  top: 62%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,92,246,0.5), transparent);
}

/* SCROLL BODY — bright aged parchment, the "light island" */
.scroll-body {
  width: 280px;
  position: relative;
  overflow: visible;
  padding: 14px 28px 12px;
  background: linear-gradient(165deg,
    #f5eedc 0%,
    #ede0c4 20%,
    #e8d8b8 45%,
    #ead9ba 60%,
    #e4d0ad 80%,
    #ddc9a5 100%
  );
  border-left: 1px solid rgba(160,120,60,0.3);
  border-right: 1px solid rgba(160,120,60,0.3);
}

/* Aged parchment texture — subtle staining + edge darkening */
.scroll-body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    /* left-right edge aging/shadow */
    radial-gradient(ellipse 18% 100% at 0% 50%, rgba(100,65,20,0.18) 0%, transparent 100%),
    radial-gradient(ellipse 18% 100% at 100% 50%, rgba(100,65,20,0.15) 0%, transparent 100%),
    /* top/bottom edge curl shadow */
    radial-gradient(ellipse 100% 25% at 50% 0%, rgba(80,50,15,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 100% 25% at 50% 100%, rgba(80,50,15,0.18) 0%, transparent 70%),
    /* faint age spot in center */
    radial-gradient(ellipse 60% 40% at 65% 40%, rgba(160,110,40,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* Parchment sheen removed */
.scroll-body::after { content: none; }

/* ======================== SCROLL CONTENT — dark ink on bright parchment ======================== */
.scroll-brand {
  text-align: center;
  margin-bottom: 10px;
}

.brand-eye {
  margin-bottom: 8px;
}

.brand-title {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.4rem;
  background: linear-gradient(135deg, #5c3d8f 0%, #8b5cf6 40%, #b8964a 70%, #5c3d8f 100%);
  background-size: 250% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.12em;
  line-height: 1;
  animation: titleShimmer 6s linear infinite;
}

@keyframes titleShimmer {
  0% { background-position: 0% 0%; }
  100% { background-position: 250% 0%; }
}

.brand-flash {
  font-size: 1rem;
  -webkit-text-fill-color: #7c3aed;
}

.brand-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(80,50,120,0.6);
  margin-top: 2px;
}

.scroll-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(92,61,143,0.5), rgba(184,150,74,0.6), rgba(92,61,143,0.5), transparent);
  margin: 8px 0;
  opacity: 0.7;
}

/* Login form on parchment — dark ink style */
.form-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(60,35,100,0.7);
  display: block;
  margin-bottom: 6px;
}

.form-field {
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: rgba(255,250,235,0.6);
  border: none;
  border-bottom: 1.5px solid rgba(92,61,143,0.35);
  padding: 7px 4px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem;
  color: #2a1a48;
  outline: none;
  border-radius: 0;
  transition: border-color 0.2s, background 0.2s;
}
.form-input:focus {
  border-bottom-color: rgba(92,61,143,0.75);
  background: rgba(255,252,240,0.8);
}
.form-input::placeholder { color: rgba(92,61,143,0.3); font-style: italic; }

.enter-btn {
  width: 100%;
  margin-top: 2px;
  padding: 8px;
  background: linear-gradient(135deg, #3d1f6e 0%, #5c3d8f 50%, #3d1f6e 100%);
  background-size: 200% 100%;
  border: none;
  border-radius: 2px;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  color: #f5eedc;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(40,10,80,0.5), inset 0 1px 0 rgba(180,150,255,0.15);
  transition: background-position 0.4s, box-shadow 0.2s;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.enter-btn:hover {
  background-position: 100% 0%;
  box-shadow: 0 6px 30px rgba(92,61,143,0.65), 0 0 20px rgba(139,92,246,0.3);
}
.enter-btn:active { transform: scale(0.98); }
.enter-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.tabs-row {
  display: flex;
  border-bottom: 1.5px solid rgba(92,61,143,0.2);
  margin-bottom: 10px;
}
.tab-btn {
  flex: 1;
  text-align: center;
  padding: 3px 0 5px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(92,61,143,0.4);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.tab-btn.active {
  color: #5c3d8f;
  border-bottom-color: #b8964a;
}

.msg {
  margin-top: 10px;
  font-size: 0.78rem;
  text-align: center;
  padding: 7px 10px;
  border-radius: 2px;
  display: none;
  font-style: italic;
}
.msg.error   { background: rgba(180,40,40,0.08); color: #8b1a1a; border: 1px solid rgba(180,60,40,0.25); display: block; }
.msg.success { background: rgba(40,120,40,0.08); color: #1a5e1a; border: 1px solid rgba(50,140,50,0.2); display: block; }

.scroll-footer {
  text-align: center;
  margin-top: 8px;
  font-size: 0.68rem;
  color: rgba(60,35,100,0.45);
  font-style: italic;
  letter-spacing: 0.05em;
}

.or-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 7px 0;
}
.or-divider::before, .or-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(92,61,143,0.25), transparent);
}
.or-divider span {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: rgba(92,61,143,0.4);
  text-transform: uppercase;
}

.google-btn {
  width: 100%;
  padding: 7px;
  background: rgba(255,250,235,0.5);
  border: 1px solid rgba(92,61,143,0.25);
  border-radius: 2px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: rgba(50,30,90,0.8);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.google-btn:hover {
  background: rgba(255,252,240,0.8);
  border-color: rgba(92,61,143,0.45);
}

/* ======================== ROPE ======================== */
.rope {
  width: 2px;
  height: 40px;
  background: linear-gradient(180deg, #4a2d8a, #8b5cf6, #b8964a, #8b5cf6);
  margin: 0 auto;
  box-shadow: 0 0 8px rgba(139,92,246,0.5);
}
</style>
</head>
<body>

<!-- Storm Background -->
<div class="storm">
  <div class="nebula"></div>
  <div class="glow-pool glow-pool-1"></div>
  <div class="glow-pool glow-pool-2"></div>
  <div class="glow-pool glow-pool-3"></div>

  <!-- Stars canvas -->
  <canvas id="starsCanvas" class="stars"></canvas>

  <!-- Lightning SVG — above scroll -->

  <!-- Particles canvas -->
  <canvas id="particlesCanvas" class="particles"></canvas>
</div>

<div class="screen-flash"></div>

<!-- The Floating Scroll -->
<div class="scroll-wrapper">
  <!-- Top rope -->
  <div class="rope" style="background:linear-gradient(180deg,transparent,#4a2d8a 30%,#8b5cf6,#b8964a 70%,transparent);"></div>

  <!-- Top cap -->
  <div class="scroll-cap">
    <div class="scroll-cap-inner">
      <div class="scroll-knob"></div>
      <div class="scroll-knob"></div>
    </div>
  </div>

  <!-- Body -->
  <div class="scroll-body">

    <div class="scroll-brand">
      <div class="brand-eye">
        <svg id="theEye" width="80" height="35" viewBox="0 0 120 52" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="irisG" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="#b088f9"/>
              <stop offset="45%" stop-color="#6b4c9a"/>
              <stop offset="100%" stop-color="#2d1b4e"/>
            </radialGradient>
            <radialGradient id="pupilG" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="#1a0a30"/>
              <stop offset="100%" stop-color="#0d0618"/>
            </radialGradient>
            <filter id="eyeGlow">
              <feGaussianBlur stdDeviation="2.5" result="b"/>

          <ellipse cx="64" cy="22" rx="3" ry="2.5" fill="rgba(255,255,255,0.6)"/>
          <circle cx="57" cy="29" r="1" fill="rgba(255,255,255,0.25)"/>
        </svg>
      </div>
      <div class="brand-title">ZEUS DAILY</div>
      <div class="brand-sub">The God's Eye View</div>
    </div>

    <div class="scroll-divider"></div>

    <!-- Tabs -->

      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登入</button>
      <button class="tab-btn" id="tabReg" onclick="switchTab('reg')">注册</button>

    <!-- Login -->
    <div id="loginForm">

        <label class="form-label">电子邮件</label>

      <div class="or-divider"><span>或</span></div>
      <button class="google-btn" onclick="doGoogle()">

        使用 Google 登入
      </button>
    </div>

    <!-- Register -->
    <div id="regForm" style="display:none;">
      <div class="form-field">
        <label class="form-label">电子邮件</label>
        <input class="form-input" type="email" id="rEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-field">
        <label class="form-label">密码（至少6位）</label>
        <input class="form-input" type="password" id="rPass" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="enter-btn" id="regBtn" onclick="doRegister()">创建账号</button>
    </div>

    <div class="msg" id="msg"></div>

  </div>

  <!-- Bottom cap -->
  <div class="scroll-cap">
    <div class="scroll-cap-inner">
      <div class="scroll-knob"></div>
      <div class="scroll-knob"></div>
    </div>
  </div>

  <!-- Bottom rope -->
  <div class="rope" style="background:linear-gradient(180deg,#b8964a,#8b5cf6,#4a2d8a 70%,transparent);"></div>
</div>

  clearMsg();
}

function clearMsg() {
  var m = document.getElementById('msg');
  m.className = 'msg'; m.textContent = '';
}

function showMsg(txt, type) {
  var m = document.getElementById('msg');
  m.textContent = txt;
  m.className = 'msg ' + type;
}

function doLogin() {
  var email = document.getElementById('lEmail').value.trim();
  var pass = document.getElementById('lPass').value;
  if (!email || !pass) { showMsg('请填写邮件和密码', 'error'); return; }
  var btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '验证中...';
  sb.auth.signInWithPassword({ email: email, password: pass }).then(function(r) {
    if (r.error) {
      var msg = r.error.message.indexOf('Invalid') >= 0 ? '邮件或密码错误' : r.error.message;
      showMsg(msg, 'error');
      btn.disabled = false; btn.textContent = '进入神之视界';
    } else {
      showMsg('✓ 欢迎，观察者', 'success');
      setTimeout(function() { window.location.href = 'dashboard.html'; }, 700);
    }
  });
}

function doRegister() {
  var email = document.getElementById('rEmail').value.trim();
  var pass = document.getElementById('rPass').value;
  if (!email || !pass) { showMsg('请填写邮件和密码', 'error'); return; }
  if (pass.length < 6) { showMsg('密码至少需要6位', 'error'); return; }
  var btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...';
  sb.auth.signUp({ email: email, password: pass }).then(function(r) {
    if (r.error) {
      showMsg(r.error.message, 'error');
      btn.disabled = false; btn.textContent = '创建账号';
    } else {
      showMsg('注册成功！请检查邮件验证', 'success');
      setTimeout(function() { switchTab('login'); btn.disabled = false; btn.textContent = '创建账号'; }, 2000);
    }
  });
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var loginVisible = document.getElementById('loginForm').style.display !== 'none';
  if (loginVisible) doLogin(); else doRegister();
});

function doGoogle() {
  sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
}

// Eye cursor track
document.addEventListener('mousemove', function(e) {
  var eye = document.getElementById('theEye');
  var rect = eye.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var dx = (e.clientX - cx) / window.innerWidth;
  var dy = (e.clientY - cy) / window.innerHeight;
  var mx = 60 + dx * 3;
  var my = 26 + dy * 2;
  var iris = eye.querySelectorAll('circle');
  if (iris[0]) { iris[0].setAttribute('cx', mx); iris[0].setAttribute('cy', my); }
  if (iris[1]) { iris[1].setAttribute('cx', mx); iris[1].setAttribute('cy', my); }
});

// ======================== STARS ========================
(function() {
  var c = document.getElementById('starsCanvas');
  var ctx = c.getContext('2d');
  var stars = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 220; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      phase: Math.random() * Math.PI * 2
    });
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * c.width, s.y * c.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(220,200,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
})();

// ======================== PARTICLES ========================
(function() {
  var c = document.getElementById('particlesCanvas');
  var ctx = c.getContext('2d');
  var pts = [];

  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function spawn() {
    pts.push({
      x: Math.random() * c.width,
      y: c.height + 10,
      r: Math.random() * 1.5 + 0.5,
      vx: (Math.random() - 0.5) * 0.8,
      vy: -(Math.random() * 0.8 + 0.3),
      life: 1,
      decay: Math.random() * 0.004 + 0.002,
      col: Math.random() > 0.5 ? '139,92,246' : '184,150,74'
    });
  }

  function tick() {
    ctx.clearRect(0, 0, c.width, c.height);
    if (Math.random() < 0.3) spawn();
    for (var i = pts.length - 1; i >= 0; i--) {
      var p = pts[i];
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      if (p.life <= 0) { pts.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + p.col + ',' + p.life * 0.7 + ')';
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// ======================== LIGHTNING — strikes INTO scroll ========================
(function() {
  var svg = document.getElementById('lightningLayer');
  var W = window.innerWidth, H = window.innerHeight;

  function setSize() {
    W = window.innerWidth; H = window.innerHeight;
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  }
  setSize();
  window.addEventListener('resize', setSize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  function generateBolt(x1, y1, x2, y2, depth) {
    if (depth <= 0) return [[x1, y1, x2, y2]];
    var spread = Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)) * 0.38;
    var mx = (x1+x2)/2 + (Math.random()-0.5) * spread;
    var my = (y1+y2)/2 + (Math.random()-0.5) * spread * 0.5;
    var segs = [].concat(
      generateBolt(x1, y1, mx, my, depth-1),
      generateBolt(mx, my, x2, y2, depth-1)
    );
    if (Math.random() < 0.45 && depth > 1) {
      segs = segs.concat(generateBolt(mx, my,
        mx + (Math.random()-0.5)*100, my + Math.random()*80, depth-2));
    }
    return segs;
  }

  function makePath(segs) {
    var d = '';
    for (var i = 0; i < segs.length; i++)
      d += 'M'+segs[i][0]+' '+segs[i][1]+' L'+segs[i][2]+' '+segs[i][3]+' ';
    return d;
  }

  function addBolt(pathD, glowColor, coreColor, glowW, coreW) {
    var glow = document.createElementNS('http://www.w3.org/2000/svg','path');
    glow.setAttribute('d', pathD);
    glow.setAttribute('stroke', glowColor);
    glow.setAttribute('stroke-width', glowW);
    glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke-linecap','round');
    glow.style.filter = 'blur(5px)';
    svg.appendChild(glow);
    var core = document.createElementNS('http://www.w3.org/2000/svg','path');
    core.setAttribute('d', pathD);
    core.setAttribute('stroke', coreColor);
    core.setAttribute('stroke-width', coreW);
    core.setAttribute('fill','none');
    core.setAttribute('stroke-linecap','round');
    svg.appendChild(core);
  }

  // Impact glow when bolt hits scroll
  function addImpact(x, y) {
    var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', x); circle.setAttribute('cy', y);
    circle.setAttribute('r', '18');
    circle.setAttribute('fill','rgba(139,92,246,0.35)');
    circle.style.filter = 'blur(8px)';
    svg.appendChild(circle);
    // small core flash
    var core = document.createElementNS('http://www.w3.org/2000/svg','circle');
    core.setAttribute('cx', x); core.setAttribute('cy', y);
    core.setAttribute('r','4');
    core.setAttribute('fill','rgba(220,200,255,0.9)');
    svg.appendChild(core);
  }

  function flashLightning() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    var scroll = document.querySelector('.scroll-wrapper');
    var sr = scroll ? scroll.getBoundingClientRect() : null;

    var numBolts = Math.floor(Math.random()*2)+1;
    for (var b = 0; b < numBolts; b++) {
      var startX = rand(W*0.05, W*0.95);
      var startY = 0;
      var strikeScroll = sr && Math.random() < 0.55; // 55% chance to hit scroll

      var endX, endY;
      if (strikeScroll) {
        // Target a random point ON the scroll
        endX = rand(sr.left + 20, sr.right - 20);
        endY = rand(sr.top + 10, sr.bottom - 10);
      } else {
        endX = startX + (Math.random()-0.5)*320;
        endY = rand(H*0.35, H*0.8);
      }

      var segs = generateBolt(startX, startY, endX, endY, 5);
      var pathD = makePath(segs);

      addBolt(pathD, 'rgba(92,61,143,0.4)', 'rgba(200,180,255,0.95)', 8, 1.3);

      if (strikeScroll) {
        // Extra bright strike on scroll hit
        addBolt(pathD, 'rgba(184,150,74,0.25)', 'rgba(255,240,180,0.5)', 4, 0.6);
        addImpact(endX, endY);
        // Also add scroll glow pulse
        if (scroll) {
          scroll.style.filter = 'drop-shadow(0 30px 80px rgba(92,61,143,0.9)) drop-shadow(0 0 60px rgba(139,92,246,0.8))';
          setTimeout(function() {
            scroll.style.filter = 'drop-shadow(0 30px 80px rgba(92,61,143,0.8)) drop-shadow(0 0 140px rgba(139,92,246,0.5))';
          }, 200);
        }
      }
    }

    // Flicker frames
    var frames = [1, 0.2, 1, 0, 0.7, 0];
    var fi = 0;
    function step() {
      if (fi >= frames.length) {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        return;
      }
      svg.style.opacity = frames[fi++];
      setTimeout(step, 55);
    }
    step();

    setTimeout(flashLightning, rand(2200, 5500));
  }

  setTimeout(flashLightning, 600);
})();
</script>
