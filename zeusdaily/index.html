<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#b8964a;--gold-dark:#8a6d2f;
  --purple-deep:#03010a;--purple-mid:#1a0a2e;
  --purple-accent:#5c3d8f;--purple-btn:#3d1f6e;
  --ink:#2a1a48;
  --parchment:#f5eedc;--parchment-dark:#ddc9a5;
}
html,body{width:100%;height:100%;background:var(--purple-deep);overflow:hidden;font-family:'IM Fell English',serif;}

/* ── STARS ── */

/* ── LIGHTNING ── */

/* ── SCENE ── */
#scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;}

/* ── SCROLL ── */
.scroll-wrap{
  display:flex;flex-direction:column;align-items:center;width:340px;max-width:92vw;
  filter:drop-shadow(0 0 32px rgba(92,61,143,0.45));
  animation:scroll-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;transform:translateZ(0);
}
@keyframes scroll-in{from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:none;}}

/* ── ROD ── */
.rod{
  width:100%;height:28px;
  background:linear-gradient(180deg,#3a2a50 0%,#1c1228 40%,#040308 100%);
  border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;padding:0 10px;
  border-top:1px solid rgba(184,150,74,0.3);border-bottom:1px solid rgba(0,0,0,0.8);
  position:relative;z-index:2;
}
.rod::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,74,0.4),transparent);}
.rod::after{content:'';position:absolute;inset:6px 55px;background:repeating-linear-gradient(90deg,transparent 0px,transparent 8px,rgba(184,150,74,0.18) 8px,rgba(184,150,74,0.18) 9px);}
.knob{width:46px;height:17px;background:linear-gradient(180deg,#3a2a50,#0c0818);border-radius:8.5px;border:1px solid rgba(184,150,74,0.25);flex-shrink:0;position:relative;z-index:3;box-shadow:0 2px 8px rgba(0,0,0,0.6);}
.knob::after{content:'';position:absolute;top:3px;left:8px;right:8px;height:1px;background:rgba(184,150,74,0.2);border-radius:1px;}

/* ── PARCHMENT ── */
.parchment{
  width:100%;will-change:auto;
  background:linear-gradient(175deg,var(--parchment) 0%,#ece3cf 40%,var(--parchment-dark) 100%);
  padding:28px 28px 24px;
  position:relative;overflow:hidden;
  border-left:1px solid rgba(184,150,74,0.15);border-right:1px solid rgba(184,150,74,0.15);
}
.parchment::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 15% 20%,rgba(139,90,20,0.07) 0%,transparent 50%),
             radial-gradient(ellipse at 85% 75%,rgba(100,60,10,0.05) 0%,transparent 45%);
  pointer-events:none;
}

/* ── LANG TOGGLE ── */
.lang-toggle{position:absolute;top:13px;right:13px;display:flex;gap:4px;z-index:5;}
.lang-btn{font-family:'Playfair Display',serif;font-size:9px;letter-spacing:1.5px;padding:3px 7px;border-radius:3px;border:1px solid rgba(42,26,72,0.2);background:transparent;color:rgba(42,26,72,0.45);cursor:pointer;transition:all 0.2s;}
.lang-btn.active{background:rgba(184,150,74,0.15);border-color:var(--gold);color:var(--gold-dark);}

/* ── EYE HEADER ── */
.eye-header{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;position:relative;z-index:1;}
.brand-title{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:6px;color:var(--ink);text-align:center;margin-bottom:12px;opacity:0.92;}
.brand-sub{font-size:8px;letter-spacing:3.5px;color:var(--gold-dark);font-family:'Playfair Display',serif;font-weight:400;text-align:center;margin-top:6px;opacity:0.65;}
.eye-wrap{width:150px;height:65px;margin:0 auto 2px;}

/* ── DIVIDER ── */
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,74,0.4),transparent);margin:12px 0 14px;position:relative;z-index:1;}

/* ── TABS ── */
.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid rgba(42,26,72,0.15);position:relative;z-index:1;}
.tab-btn{flex:1;background:none;border:none;padding:7px 0 8px;font-family:'Playfair Display',serif;font-size:11px;letter-spacing:2px;color:rgba(42,26,72,0.45);cursor:pointer;transition:color 0.2s;position:relative;}
.tab-btn.active{color:var(--ink);}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:var(--gold);border-radius:1px;}

/* ── FORM ── */
.form-panel{position:relative;z-index:1;}
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-family:'Playfair Display',serif;font-size:9px;letter-spacing:2.5px;color:rgba(42,26,72,0.55);margin-bottom:6px;text-transform:uppercase;}
.form-group input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.5);border:1px solid rgba(42,26,72,0.15);border-radius:6px;font-family:'IM Fell English',serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.form-group input::placeholder{color:rgba(42,26,72,0.28);font-style:italic;}
.form-group input:focus{border-color:rgba(184,150,74,0.5);box-shadow:0 0 0 3px rgba(184,150,74,0.1);background:rgba(255,255,255,0.65);}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--purple-btn),var(--purple-accent));border:1px solid rgba(92,61,143,0.6);border-radius:6px;color:rgba(255,255,255,0.95);font-family:'Playfair Display',serif;font-size:11px;letter-spacing:2.5px;cursor:pointer;margin-top:8px;transition:all 0.2s;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);transition:left 0.4s;}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{box-shadow:0 4px 20px rgba(92,61,143,0.45);border-color:rgba(184,150,74,0.35);transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:0.55;cursor:default;transform:none;}

.btn-google{width:100%;padding:11px;background:rgba(255,255,255,0.6);border:1px solid rgba(42,26,72,0.15);border-radius:6px;color:var(--ink);font-family:'Playfair Display',serif;font-size:11px;letter-spacing:1.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;position:relative;z-index:1;}
.btn-google:hover{background:rgba(255,255,255,0.85);border-color:rgba(184,150,74,0.4);box-shadow:0 2px 12px rgba(184,150,74,0.1);}
.btn-google:disabled{opacity:0.55;cursor:default;}
.btn-google svg{width:16px;height:16px;flex-shrink:0;}

.or-line{display:flex;align-items:center;gap:10px;margin:14px 0 10px;position:relative;z-index:1;}
.or-line::before,.or-line::after{content:'';flex:1;height:1px;background:rgba(42,26,72,0.15);}
.or-line span{font-size:8px;letter-spacing:2.5px;color:rgba(42,26,72,0.35);font-family:'Playfair Display',serif;text-transform:uppercase;}

/* ── ALERTS ── */
.alert-err{display:none;font-size:11px;color:#c0392b;font-family:'Playfair Display',serif;margin-bottom:8px;padding:8px 10px;background:rgba(192,57,43,0.08);border-radius:5px;border:1px solid rgba(192,57,43,0.2);line-height:1.5;}
.alert-ok{display:none;font-size:11px;color:#2e7d5a;font-family:'Playfair Display',serif;margin-bottom:8px;padding:8px 10px;background:rgba(46,125,90,0.08);border-radius:5px;border:1px solid rgba(46,125,90,0.2);line-height:1.5;}

.en-only{display:none;}

/* mobile performance */
@media(max-width:768px){
  .scroll-wrap{ filter:drop-shadow(0 0 20px rgba(92,61,143,0.4)); }
}

/* ── CSS STARS — compositor-only, zero JS ── */
#css-stars{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:star-twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes star-twinkle{0%,100%{opacity:var(--min,0.15);}50%{opacity:var(--max,0.75);}}

<script>
// ── CAPTURE REF CODE ON PAGE LOAD ──
(function(){
  var ref = new URLSearchParams(window.location.search).get('ref');
  if(ref){ try{ localStorage.setItem('zeus-ref', ref); }catch(e){} }
})();

// ── EYE BLINK + TRACK ──
(function(){
  var OPEN='M 5,26 C 25,8 95,8 115,26 C 95,44 25,44 5,26 Z';
  var CLOSE='M 5,26 C 25,26 95,26 115,26 C 95,26 25,26 5,26 Z';
  function blink(){
    var o=document.getElementById('eyeOutline'),c=document.getElementById('eyeClipPath');
    if(o)o.setAttribute('d',CLOSE); if(c)c.setAttribute('d',CLOSE);
    setTimeout(function(){ var o=document.getElementById('eyeOutline'),c=document.getElementById('eyeClipPath'); if(o)o.setAttribute('d',OPEN); if(c)c.setAttribute('d',OPEN); },180);
    setTimeout(blink, 2200+Math.random()*3200);
  }
  setTimeout(blink, 1500);
  document.addEventListener('mousemove',function(ev){
    var svg=document.getElementById('mainEye'); if(!svg) return;
    var r=svg.getBoundingClientRect();
    var cx=r.left+r.width/2, cy=r.top+r.height/2;
    var dx=ev.clientX-cx, dy=ev.clientY-cy;
    var angle=Math.atan2(dy,dx), dist=Math.sqrt(dx*dx+dy*dy);
    var mv=Math.min(dist/80,1)*3;
    var nx=Math.cos(angle)*mv, ny=Math.sin(angle)*mv;
    var iris=document.getElementById('iris'),pup=document.getElementById('pupil');
    if(iris){iris.setAttribute('cx',60+nx);iris.setAttribute('cy',26+ny);}
    if(pup){pup.setAttribute('cx',60+nx*1.2);pup.setAttribute('cy',26+ny*1.2);}
  });
})();

// ── LANGUAGE ──
function applyLang(lang){
  document.querySelectorAll('.zh-only').forEach(function(el){el.style.display=lang==='zh'?(el.tagName==='SPAN'?'inline':'block'):'none';});
  document.querySelectorAll('.en-only').forEach(function(el){el.style.display=lang==='en'?(el.tagName==='SPAN'?'inline':'block'):'none';});
  document.getElementById('btn-zh').className='lang-btn'+(lang==='zh'?' active':'');
  document.getElementById('btn-en').className='lang-btn'+(lang==='en'?' active':'');
}
function setLang(lang){ try{localStorage.setItem('zeus-lang',lang);}catch(e){} applyLang(lang); }
(function(){ var s='zh'; try{s=localStorage.getItem('zeus-lang')||'zh';}catch(e){} applyLang(s); })();

// ── TABS ──
function switchTab(tab){
  var isLogin=tab==='login';
  document.getElementById('tab-login').className='tab-btn'+(isLogin?' active':'');
  document.getElementById('tab-register').className='tab-btn'+(!isLogin?' active':'');
  document.getElementById('panel-login').style.display=isLogin?'block':'none';
  document.getElementById('panel-register').style.display=!isLogin?'block':'none';
}

// ── SUPABASE ──
(function(){
  var _sb = supabase.createClient(
    'https://ruuksrwlgsenkkkkapbu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dWtzcndsZ3Nlbmtra2thcGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc3MjksImV4cCI6MjA4ODgwMzcyOX0.95Vne7MuFGp7rjR0Xsur-9sRH10BBeheCxvksWbbpLw'
  );

  var L = function(){ try{return localStorage.getItem('zeus-lang')||'zh';}catch(e){return 'zh';} };

  // Redirect if already logged in
  _sb.auth.getSession().then(function(res){
    if(res.data&&res.data.session) window.location.href='dashboard.html';
  });

  // Handle OAuth return (Google) + write invited_by if needed
  _sb.auth.onAuthStateChange(function(event,session){
    if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED')&&session){
      var savedRef=''; try{savedRef=localStorage.getItem('zeus-ref')||'';}catch(e){}
      if(savedRef){
        // Try to update invited_by — retry up to 5 times until profile exists
        var attempts=0;
        function tryUpdate(){
          attempts++;
          _sb.from('profiles').update({invited_by:savedRef}).eq('id',session.user.id).is('invited_by',null).then(function(r){
            if(!r.error){ try{localStorage.removeItem('zeus-ref');}catch(e){} }
            else if(attempts<5){ setTimeout(tryUpdate,1500); }
          });
        }
        setTimeout(tryUpdate,1000);
      }
      window.location.href='dashboard.html';
    }
  });

  function setLoading(btn,on){ btn.disabled=on; btn.style.opacity=on?'0.58':'1'; }
  function showErr(id,msg){ var el=document.getElementById(id); if(el){el.textContent=msg;el.style.display=msg?'block':'none';} }
  function showOk(id,msg){ var el=document.getElementById(id); if(el){el.textContent=msg;el.style.display=msg?'block':'none';} }

  // Login
  var btnLogin=document.getElementById('btn-login');
  if(btnLogin){
    btnLogin.addEventListener('click',function(){
      var email=(document.getElementById('login-email')||{}).value||'';
      var pass=(document.getElementById('login-password')||{}).value||'';
      showErr('login-error','');
      if(!email||!pass){showErr('login-error',L()==='zh'?'请填写邮件和密码':'Please enter email and password');return;}
      setLoading(btnLogin,true);
      _sb.auth.signInWithPassword({email:email,password:pass}).then(function(res){
        setLoading(btnLogin,false);
        if(res.error){
          var m=res.error.message||'';
          if(m.indexOf('Invalid')>=0||m.indexOf('credentials')>=0) m=L()==='zh'?'邮件或密码错误':'Invalid email or password';
          showErr('login-error',m);
        } else { window.location.href='dashboard.html'; }
      });
    });
    ['login-email','login-password'].forEach(function(id){
      var el=document.getElementById(id);
      if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter')btnLogin.click();});
    });
  }

  // Google
  var btnGoogle=document.getElementById('btn-google');
  if(btnGoogle){
    btnGoogle.addEventListener('click',function(){
      setLoading(btnGoogle,true);
      var refParam=new URLSearchParams(window.location.search).get('ref')||'';
      try{ if(refParam) localStorage.setItem('zeus-ref',refParam); }catch(e){}
      // Pass ref in redirect URL so it survives OAuth round-trip
      var savedRef=refParam; try{savedRef=savedRef||localStorage.getItem('zeus-ref')||'';}catch(e){}
      var redirectUrl=window.location.origin+'/dashboard.html'+(savedRef?'?ref='+encodeURIComponent(savedRef):'');
      _sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirectUrl}}).then(function(res){
        if(res.error){setLoading(btnGoogle,false);showErr('login-error',res.error.message||(L()==='zh'?'Google 登录失败':'Google sign-in failed'));}
      });
    });
  }

  // Register
  var btnReg=document.getElementById('btn-register');
  if(btnReg){
    btnReg.addEventListener('click',function(){
      var email=(document.getElementById('reg-email')||{}).value||'';
      var pass=(document.getElementById('reg-password')||{}).value||'';
      showErr('reg-error',''); showOk('reg-success','');
      if(!email||!pass){showErr('reg-error',L()==='zh'?'请填写邮件和密码':'Please enter email and password');return;}
      if(pass.length<6){showErr('reg-error',L()==='zh'?'密码至少 6 位':'Password must be at least 6 characters');return;}
      setLoading(btnReg,true);
      // Read ref from URL or localStorage
      var savedRef='';
      try{savedRef=new URLSearchParams(window.location.search).get('ref')||localStorage.getItem('zeus-ref')||'';}catch(e){}
      _sb.auth.signUp({email:email,password:pass}).then(function(res){
        setLoading(btnReg,false);
        if(res.error){
          showErr('reg-error',res.error.message);
        } else {
          // Write invited_by with retry
          if(savedRef&&res.data&&res.data.user){
            var uid=res.data.user.id, attempts=0;
            function tryUpdate(){
              attempts++;
              _sb.from('profiles').update({invited_by:savedRef}).eq('id',uid).is('invited_by',null).then(function(r){
                if(!r.error){ try{localStorage.removeItem('zeus-ref');}catch(e){} }
                else if(attempts<6){ setTimeout(tryUpdate,1500); }
              });
            }
            setTimeout(tryUpdate,1200);
          }
          showOk('reg-success',L()==='zh'?'✓ 注册成功，请检查邮箱完成验证':'✓ Account created! Check your email to verify.');
        }
      });
    });
    ['reg-email','reg-password'].forEach(function(id){
      var el=document.getElementById(id);
      if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter')btnReg.click();});
    });
  }
})();
</script>
