<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#b8964a;
  --gold-dark:#8a6d2f;
  --purple-deep:#03010a;
  --purple-mid:#1a0a2e;
  --purple-accent:#5c3d8f;
  --purple-btn:#3d1f6e;
  --ink:#2a1a48;
  --parchment:#f5eedc;
  --parchment-dark:#ddc9a5;
  --rod:#2a1e3e;
}

html,body{
  width:100%;height:100%;
  background:var(--purple-deep);
  overflow:hidden;
  font-family:'IM Fell English',serif;
}

/* ── STAR FIELD ── */


/* ── LIGHTNING CANVAS ── */


/* ── SCENE ── */
#scene{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}

/* ── SCROLL WRAPPER ── */
.scroll-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:300px;
  filter:drop-shadow(0 0 40px rgba(92,61,143,0.5)) drop-shadow(0 20px 60px rgba(0,0,0,0.8));
}

/* ── TOP ROD ── */
.rod{
  width:100%;
  height:28px;
  background:linear-gradient(180deg,#3a2a50 0%,#1c1228 40%,#040308 100%);
  border-radius:14px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  border-top:1px solid rgba(184,150,74,0.3);
  border-bottom:1px solid rgba(0,0,0,0.8);
  z-index:2;
}
.rod::before{
  content:'';
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(184,150,74,0.4),transparent);
}
/* gold tick marks */
.rod::after{
  content:'';
  position:absolute;
  inset:6px 55px;
  background:repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 8px,
    rgba(184,150,74,0.18) 8px,
    rgba(184,150,74,0.18) 9px
  );
}

/* ── ROD KNOB ── */
.knob{
  width:46px;height:17px;
  background:linear-gradient(180deg,#3a2a50,#0c0818);
  border-radius:8.5px;
  border:1px solid rgba(184,150,74,0.25);
  flex-shrink:0;
  position:relative;
  z-index:3;
  box-shadow:0 2px 8px rgba(0,0,0,0.6);
}
.knob::after{
  content:'';
  position:absolute;
  top:3px;left:8px;right:8px;height:1px;
  background:rgba(184,150,74,0.2);
  border-radius:1px;
}

/* ── PARCHMENT BODY ── */
.parchment{
  width:100%;
  background:linear-gradient(175deg,var(--parchment) 0%,#ece3cf 40%,var(--parchment-dark) 100%);
  padding:28px 26px 24px;
  position:relative;
  overflow:hidden;
  border-left:1px solid rgba(184,150,74,0.15);
  border-right:1px solid rgba(184,150,74,0.15);
}

/* aged texture */
.parchment::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(139,90,20,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 75%, rgba(100,60,10,0.05) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(180,140,80,0.03) 0%, transparent 70%);
  pointer-events:none;
}
/* paper grain */
.parchment::after{
  content:'';
  position:absolute;inset:0;
  
  opacity:0.5;
  pointer-events:none;
}

/* ── EYE HEADER ── */
.eye-header{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:18px;
  position:relative;
  z-index:1;
}

.brand-title{
  font-family:'Playfair Display',serif;
  font-weight:900;
  font-size:15px;
  letter-spacing:4px;
  color:var(--ink);
  text-align:center;
  margin-bottom:10px;
  opacity:0.9;
}
.brand-sub{
  font-size:8px;
  letter-spacing:3px;
  color:var(--gold-dark);
  font-family:'Playfair Display',serif;
  font-weight:400;
  text-align:center;
  margin-top:4px;
  opacity:0.7;
}

/* eye SVG container */
.eye-wrap{
  width:140px;height:61px;
  margin:0 auto 2px;
}

/* ── DIVIDER ── */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(184,150,74,0.4),transparent);
  margin:14px 0 16px;
  position:relative;
  z-index:1;
}

/* ── TABS ── */
.tabs{
  display:flex;
  gap:0;
  margin-bottom:18px;
  border-bottom:1px solid rgba(42,26,72,0.15);
  position:relative;
  z-index:1;
}
.tab-btn{
  flex:1;
  background:none;
  border:none;
  padding:7px 0 8px;
  font-family:'Playfair Display',serif;
  font-size:11px;
  letter-spacing:2px;
  color:rgba(42,26,72,0.45);
  cursor:pointer;
  transition:color 0.2s;
  position:relative;
}
.tab-btn.active{
  color:var(--ink);
}
.tab-btn.active::after{
  content:'';
  position:absolute;
  bottom:-1px;left:15%;right:15%;height:2px;
  background:var(--gold);
  border-radius:1px;
}

/* ── LANG TOGGLE ── */
.lang-toggle{
  position:absolute;
  top:14px;right:14px;
  display:flex;gap:4px;
  z-index:5;
}
.lang-btn{
  font-family:'Playfair Display',serif;
  font-size:9px;
  letter-spacing:1.5px;
  padding:3px 7px;
  border-radius:3px;
  border:1px solid rgba(42,26,72,0.2);
  background:transparent;
  color:rgba(42,26,72,0.45);
  cursor:pointer;
  transition:all 0.2s;
}
.lang-btn.active{
  background:rgba(184,150,74,0.15);
  border-color:var(--gold);
  color:var(--gold-dark);
}

/* ── FORM ── */
.form-panel{
  position:relative;
  z-index:1;
}
.form-group{
  margin-bottom:12px;
}
.form-group label{
  display:block;
  font-family:'Playfair Display',serif;
  font-size:9px;
  letter-spacing:2.5px;
  color:rgba(42,26,72,0.55);
  margin-bottom:5px;
  text-transform:uppercase;
}
.form-group input{
  width:100%;
  padding:9px 12px;
  background:rgba(255,255,255,0.45);
  border:1px solid rgba(42,26,72,0.18);
  border-radius:4px;
  font-family:'IM Fell English',serif;
  font-size:13px;
  color:var(--ink);
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.form-group input::placeholder{
  color:rgba(42,26,72,0.3);
  font-style:italic;
}
.form-group input:focus{
  border-color:rgba(184,150,74,0.5);
  box-shadow:0 0 0 3px rgba(184,150,74,0.08);
  background:rgba(255,255,255,0.6);
}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;
  padding:10px;
  background:linear-gradient(135deg,var(--purple-btn),var(--purple-accent));
  border:1px solid rgba(92,61,143,0.6);
  border-radius:4px;
  color:rgba(255,255,255,0.92);
  font-family:'Playfair Display',serif;
  font-size:11px;
  letter-spacing:2.5px;
  cursor:pointer;
  margin-top:6px;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
}
.btn-primary::before{
  content:'';
  position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  transition:left 0.4s;
}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{
  box-shadow:0 4px 20px rgba(92,61,143,0.4);
  border-color:rgba(184,150,74,0.3);
}

.btn-google{
  width:100%;
  padding:9px;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(42,26,72,0.18);
  border-radius:4px;
  color:var(--ink);
  font-family:'Playfair Display',serif;
  font-size:10px;
  letter-spacing:1.5px;
  cursor:pointer;
  margin-top:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all 0.2s;
}
.btn-google:hover{
  background:rgba(255,255,255,0.75);
  border-color:rgba(184,150,74,0.3);
}
.btn-google svg{width:14px;height:14px;}

.or-line{
  display:flex;align-items:center;gap:10px;
  margin:12px 0 4px;
  position:relative;z-index:1;
}
.or-line::before,.or-line::after{
  content:'';flex:1;height:1px;
  background:rgba(42,26,72,0.15);
}
.or-line span{
  font-size:9px;letter-spacing:2px;
  color:rgba(42,26,72,0.35);
  font-family:'Playfair Display',serif;
}

/* ── BOTTOM ROD (same as top) ── */


  #mainEye #iris { filter: none !important; }
}
</style>

            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

<script>



// ── TABS ──
function switchTab(tab){
  var isLogin = tab==='login';
  document.getElementById('tab-login').className    = 'tab-btn'+(isLogin?' active':'');
  document.getElementById('tab-register').className = 'tab-btn'+(!isLogin?' active':'');
  document.getElementById('panel-login').style.display    = isLogin?'block':'none';
  document.getElementById('panel-register').style.display = !isLogin?'block':'none';
}

// ── LANGUAGE ──
function applyLang(lang){
  var zhEls = document.querySelectorAll('.zh-only');
  var enEls = document.querySelectorAll('.en-only');
  for(var i=0;i<zhEls.length;i++) zhEls[i].style.display = lang==='zh'?'':'none';
  for(var i=0;i<enEls.length;i++) enEls[i].style.display = lang==='en'?'':'none';
  document.getElementById('btn-zh').className = 'lang-btn'+(lang==='zh'?' active':'');
  document.getElementById('btn-en').className = 'lang-btn'+(lang==='en'?' active':'');
}

function setLang(lang){
  try{ localStorage.setItem('zeus-lang', lang); }catch(e){}
  applyLang(lang);
}

// Init language from storage
(function(){
  var saved = 'zh';
  try{ saved = localStorage.getItem('zeus-lang') || 'zh'; }catch(e){}
  applyLang(saved);
})();

// ── SUPABASE AUTH ──
(function(){
  var SUPABASE_URL = 'https://ruuksrwlgsenkkkkapbu.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dWtzcndsZ3Nlbmtra2thcGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc3MjksImV4cCI6MjA4ODgwMzcyOX0.95Vne7MuFGp7rjR0Xsur-9sRH10BBeheCxvksWbbpLw';
  var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var lang = function(){ try{ return localStorage.getItem('zeus-lang')||'zh'; }catch(e){ return 'zh'; } };

  // If already logged in → go straight to dashboard
  client.auth.getSession().then(function(res){
    if(res.data && res.data.session) window.location.href = 'dashboard.html';
  });

  // Handle OAuth redirect (Google callback lands back here)
  client.auth.onAuthStateChange(function(event, session){
    if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session){
      window.location.href = 'dashboard.html';
    }
  });

  function setLoading(btn, loading){
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.6' : '1';
  }

  function showError(elId, msg){
    var el = document.getElementById(elId);
    if(!el) return;
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  // ── Email / Password Login ──
  var btnLogin = document.getElementById('btn-login');
  if(btnLogin){
    btnLogin.addEventListener('click', function(){
      var email = (document.getElementById('login-email')||{}).value || '';
      var pass  = (document.getElementById('login-password')||{}).value || '';
      showError('login-error', '');
      if(!email || !pass){
        showError('login-error', lang()==='zh' ? '请填写邮件和密码' : 'Please enter email and password');
        return;
      }
      setLoading(btnLogin, true);
      client.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
        setLoading(btnLogin, false);
        if(res.error){
          var msg = res.error.message || '';
          if(msg.indexOf('Invalid') >= 0 || msg.indexOf('credentials') >= 0)
            msg = lang()==='zh' ? '邮件或密码错误' : 'Invalid email or password';
          showError('login-error', msg);
        } else {
          window.location.href = 'dashboard.html';
        }
      });
    });
  }

  // Enter key triggers login
  ['login-email','login-password'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.addEventListener('keydown', function(e){ if(e.key==='Enter' && btnLogin) btnLogin.click(); });
  });

  // ── Google OAuth ──
  var btnGoogle = document.getElementById('btn-google');
  if(btnGoogle){
    btnGoogle.addEventListener('click', function(){
      setLoading(btnGoogle, true);
      client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      }).then(function(res){
        if(res.error){
          setLoading(btnGoogle, false);
          showError('login-error', res.error.message || (lang()==='zh' ? 'Google 登录失败' : 'Google sign-in failed'));
        }
        // On success browser redirects automatically — no need to do anything
      });
    });
  }

  // ── Register ──
  var btnReg = document.getElementById('btn-register');
  if(btnReg){
    btnReg.addEventListener('click', function(){
      var email = (document.getElementById('reg-email')||{}).value || '';
      var pass  = (document.getElementById('reg-password')||{}).value || '';
      showError('reg-error', '');
      showError('reg-success', '');
      if(!email || !pass){
        showError('reg-error', lang()==='zh' ? '请填写邮件和密码' : 'Please enter email and password');
        return;
      }
      if(pass.length < 6){
        showError('reg-error', lang()==='zh' ? '密码至少 6 位' : 'Password must be at least 6 characters');
        return;
      }
      setLoading(btnReg, true);
      // Read referral code from URL ?ref=XXXX
      var urlRef = (new URLSearchParams(window.location.search)).get('ref') || '';
      client.auth.signUp({ email: email, password: pass }).then(function(res){
        setLoading(btnReg, false);
        if(res.error){
          showError('reg-error', res.error.message);
        } else {
          // If referred, update invited_by in profiles after a short delay
          if(urlRef && res.data && res.data.user){
            setTimeout(function(){
              client.from('profiles').update({ invited_by: urlRef }).eq('id', res.data.user.id).then(function(){});
            }, 2000);
          }
          showError('reg-success', lang()==='zh' ? '✓ 注册成功！请检查邮箱验证链接' : '✓ Account created! Check your email to verify.');
        }
      });
    });
  }
})();
</script>
</body>
</html>
