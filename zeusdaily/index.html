<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Daily · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #faf8f4;
    --dark: #2c2420;
    --mid: #3d3530;
    --gold: #b8964a;
    --gold-dark: #8a6d2f;
    --purple: #5c3d8f;
    --purple-light: #b088f9;
    --border: rgba(184,150,74,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 30%, rgba(184,150,74,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 600px at 80% 70%, rgba(92,61,143,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Corner ornaments */
  .corner {
    position: fixed;
    width: 80px;
    height: 80px;
    opacity: 0.18;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); }
  .corner-tr { top: 24px; right: 24px; border-top: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .logo-zeus {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 42px;
    letter-spacing: 0.12em;
    color: var(--dark);
    line-height: 1;
  }

  .logo-eye-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2px 0;
  }

  .logo-daily {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .tagline {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 0.05em;
    opacity: 0.8;
    margin-top: 2px;
  }

  /* Card */
  .card {
    width: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px 32px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 24px; right: 24px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--mid);
    opacity: 0.5;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    text-transform: uppercase;
  }

  .tab.active {
    opacity: 1;
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Form */
  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--mid);
    opacity: 0.7;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(250,248,244,0.8);
    border: 1px solid rgba(184,150,74,0.2);
    border-radius: 1px;
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,150,74,0.1);
  }

  input::placeholder { color: rgba(44,36,32,0.3); }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 1px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn:hover::before { opacity: 1; }
  .btn span { position: relative; z-index: 1; }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--mid);
    opacity: 0.4;
    letter-spacing: 0.1em;
  }

  /* Google button */
  .btn-google {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--dark);
    border: 1px solid var(--border);
    border-radius: 1px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
  }

  .btn-google:hover {
    border-color: var(--gold);
    background: rgba(184,150,74,0.05);
  }

  /* Message */
  .msg {
    padding: 10px 14px;
    border-radius: 1px;
    font-size: 14px;
    margin-top: 12px;
    display: none;
    line-height: 1.5;
  }

  .msg.error {
    background: rgba(180,50,50,0.08);
    border: 1px solid rgba(180,50,50,0.2);
    color: #8b2020;
    display: block;
  }

  .msg.success {
    background: rgba(92,143,61,0.08);
    border: 1px solid rgba(92,143,61,0.2);
    color: #2a5c0a;
    display: block;
  }

  .msg.info {
    background: rgba(92,61,143,0.08);
    border: 1px solid rgba(92,61,143,0.2);
    color: var(--purple);
    display: block;
  }

  /* Footer */
  .footer {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--mid);
    opacity: 0.35;
    text-align: center;
  }

  /* Loading spinner */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 1.5px solid rgba(250,248,244,0.3);
    border-top-color: var(--cream);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  /* Panel switching */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Forgot password */
  .forgot {
    font-size: 12px;
    color: var(--gold-dark);
    cursor: pointer;
    text-align: right;
    display: block;
    margin-top: -8px;
    margin-bottom: 16px;
    font-style: italic;
    opacity: 0.8;
    transition: opacity 0.2s;
    background: none;
    border: none;
    font-family: 'Crimson Pro', serif;
  }
  .forgot:hover { opacity: 1; }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-zeus">ZEUS</div>
    <div class="logo-eye-wrap">
      <svg id="mainEye" viewBox="0 0 120 52" width="90" height="39" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="eyeGlow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b088f9"/>
            <stop offset="45%" stop-color="#6b4c9a"/>
            <stop offset="100%" stop-color="#2d1b4e"/>
          </radialGradient>
          <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b8964a" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#b8964a" stop-opacity="0"/>
          </radialGradient>
          <clipPath id="eyeClip">
            <path id="eyeUpper" d="M6,26 Q60,-8 114,26"/>
            <path id="eyeLower" d="M6,26 Q60,60 114,26"/>
          </clipPath>
        </defs>
        <!-- Eye outline -->
        <path id="lidU" d="M6,26 Q60,-8 114,26" fill="none" stroke="#b8964a" stroke-width="1.5" filter="url(#eyeGlow)"/>
        <path id="lidL" d="M6,26 Q60,60 114,26" fill="none" stroke="#b8964a" stroke-width="1.5" filter="url(#eyeGlow)"/>
        <!-- Eye fill -->
        <path d="M6,26 Q60,-8 114,26 Q60,60 6,26" fill="white"/>
        <!-- Iris -->
        <circle id="iris" cx="60" cy="26" r="18" fill="url(#nebula)" clip-path="url(#eyeClip)"/>
        <!-- Pupil glow -->
        <circle id="pupilG" cx="60" cy="26" r="8" fill="url(#pupilGlow)" clip-path="url(#eyeClip)"/>
        <!-- Pupil -->
        <circle id="pupil" cx="60" cy="26" r="6" fill="#0a0510" clip-path="url(#eyeClip)"/>
        <!-- Highlights -->
        <circle id="hl1" cx="66" cy="20" r="1.5" fill="white" opacity="0.9" clip-path="url(#eyeClip)"/>
        <circle id="hl2" cx="56" cy="23" r="0.8" fill="#b8964a" opacity="0.8" clip-path="url(#eyeClip)"/>
        <!-- Blink overlay -->
        <path id="blinkU" d="M6,26 Q60,26 114,26" fill="none" stroke="none"/>
        <path id="blinkFill" d="M6,26 Q60,26 114,26 Q60,26 6,26" fill="#faf8f4" opacity="0"/>
      </svg>
    </div>
    <div class="logo-daily">Daily</div>
    <div class="tagline">The God's Eye View</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">登 录</button>
      <button class="tab" onclick="switchTab('register')">注 册</button>
    </div>

    <!-- Login Panel -->
    <div id="panel-login" class="panel active">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="forgot" onclick="showForgot()">忘记密码？</button>
      <button class="btn" onclick="doLogin()" id="btn-login">
        <span>进入神殿</span>
      </button>
      <div class="divider"><span>或者</span></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        以 Google 账号登录
      </button>
      <div id="msg-login" class="msg"></div>
    </div>

    <!-- Register Panel -->
    <div id="panel-register" class="panel">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>设置密码</label>
        <input type="password" id="reg-password" placeholder="至少 8 位" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" autocomplete="new-password"/>
      </div>
      <button class="btn" onclick="doRegister()" id="btn-register">
        <span>加入神殿</span>
      </button>
      <div id="msg-register" class="msg"></div>
    </div>

    <!-- Forgot Panel -->
    <div id="panel-forgot" class="panel">
      <p style="font-size:14px;color:var(--mid);margin-bottom:20px;line-height:1.6;">
        输入注册邮箱，我们将发送重置链接。
      </p>
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="forgot-email" placeholder="your@email.com"/>
      </div>
      <button class="btn" onclick="doForgot()" id="btn-forgot">
        <span>发送重置邮件</span>
      </button>
      <button class="forgot" style="text-align:center;width:100%;margin-top:12px;" onclick="switchTab('login')">← 返回登录</button>
      <div id="msg-forgot" class="msg"></div>
    </div>
  </div>

  <div class="footer">A ZEUS 9 PUBLICATION · ZEUS9.AI</div>
</div>

<script>
var SUPABASE_URL = 'https://ruuksrwlgsenkkkkapbu.supabase.co';
var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dWtzcndsZ3Nlbmtra2thcGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc3MjksImV4cCI6MjA4ODgwMzcyOX0.95Vne7MuFGp7rjR0Xsur-9sRH10BBeheCxvksWbbpLw';

var client = supabase.createClient(SUPABASE_URL, ANON_KEY);

// Eye animation
var pupilEl = document.getElementById('pupil');
var irisEl = document.getElementById('iris');
var pupilGEl = document.getElementById('pupilG');
var hl1El = document.getElementById('hl1');
var hl2El = document.getElementById('hl2');
var blinkFillEl = document.getElementById('blinkFill');
var lidUEl = document.getElementById('lidU');
var lidLEl = document.getElementById('lidL');
var eyeSvg = document.getElementById('mainEye');

var cx = 60, cy = 26, maxR = 10;
var currentX = cx, currentY = cy;

document.addEventListener('mousemove', function(e) {
  var rect = eyeSvg.getBoundingClientRect();
  var ex = rect.left + rect.width / 2;
  var ey = rect.top + rect.height / 2;
  var dx = e.clientX - ex;
  var dy = e.clientY - ey;
  var dist = Math.sqrt(dx*dx + dy*dy);
  var angle = Math.atan2(dy, dx);
  var r = Math.min(dist / 40, 1) * maxR;
  currentX = cx + Math.cos(angle) * r;
  currentY = cy + Math.sin(angle) * r * 0.55;
  updatePupil(currentX, currentY);
});

function updatePupil(x, y) {
  pupilEl.setAttribute('cx', x);
  irisEl.setAttribute('cx', x);
  pupilGEl.setAttribute('cx', x);
  hl1El.setAttribute('cx', x + 6);
  hl1El.setAttribute('cy', y - 6);
  hl2El.setAttribute('cx', x - 4);
  hl2El.setAttribute('cy', y - 3);
}

function doBlink() {
  // close
  lidUEl.setAttribute('d', 'M6,26 Q60,20 114,26');
  lidLEl.setAttribute('d', 'M6,26 Q60,32 114,26');
  blinkFillEl.setAttribute('d', 'M6,26 Q60,20 114,26 Q60,32 6,26');
  blinkFillEl.setAttribute('opacity', '1');
  // open after 200ms
  setTimeout(function() {
    lidUEl.setAttribute('d', 'M6,26 Q60,-8 114,26');
    lidLEl.setAttribute('d', 'M6,26 Q60,60 114,26');
    blinkFillEl.setAttribute('opacity', '0');
  }, 200);
  // next blink
  var next = 4000 + Math.random() * 4000;
  setTimeout(doBlink, next);
}
setTimeout(doBlink, 3000 + Math.random() * 3000);

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
}

function showForgot() {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-forgot').classList.add('active');
}

function showMsg(id, type, text) {
  var el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

function setLoading(btnId, loading, text) {
  var btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span><span class="loading"></span>' + text + '</span>';
  } else {
    btn.disabled = false;
    btn.innerHTML = '<span>' + text + '</span>';
  }
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-password').value;
  if (!email || !pass) { showMsg('msg-login', 'error', '请填写邮箱和密码'); return; }
  setLoading('btn-login', true, '验证中…');
  var result = await client.auth.signInWithPassword({ email: email, password: pass });
  if (result.error) {
    showMsg('msg-login', 'error', '登录失败：' + result.error.message);
    setLoading('btn-login', false, '进入神殿');
  } else {
    showMsg('msg-login', 'success', '✓ 欢迎回来，正在跳转…');
    setTimeout(function() { window.location.href = 'dashboard.html'; }, 1200);
  }
}

async function doRegister() {
  var email = document.getElementById('reg-email').value.trim();
  var pass = document.getElementById('reg-password').value;
  var pass2 = document.getElementById('reg-password2').value;
  if (!email || !pass) { showMsg('msg-register', 'error', '请填写所有字段'); return; }
  if (pass !== pass2) { showMsg('msg-register', 'error', '两次密码不一致'); return; }
  if (pass.length < 8) { showMsg('msg-register', 'error', '密码至少需要 8 位'); return; }
  setLoading('btn-register', true, '创建账户…');
  var result = await client.auth.signUp({ email: email, password: pass });
  if (result.error) {
    showMsg('msg-register', 'error', '注册失败：' + result.error.message);
    setLoading('btn-register', false, '加入神殿');
  } else {
    showMsg('msg-register', 'success', '✓ 注册成功！请检查邮箱完成验证。');
    setLoading('btn-register', false, '加入神殿');
  }
}

async function doGoogle() {
  await client.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
}

async function doForgot() {
  var email = document.getElementById('forgot-email').value.trim();
  if (!email) { showMsg('msg-forgot', 'error', '请输入邮箱地址'); return; }
  setLoading('btn-forgot', true, '发送中…');
  var result = await client.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });
  if (result.error) {
    showMsg('msg-forgot', 'error', '发送失败：' + result.error.message);
  } else {
    showMsg('msg-forgot', 'success', '✓ 重置链接已发送，请查收邮箱。');
  }
  setLoading('btn-forgot', false, '发送重置邮件');
}

// Enter key
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var active = document.querySelector('.panel.active');
  if (!active) return;
  var id = active.id;
  if (id === 'panel-login') doLogin();
  else if (id === 'panel-register') doRegister();
  else if (id === 'panel-forgot') doForgot();
});

// Check if already logged in
client.auth.getSession().then(function(res) {
