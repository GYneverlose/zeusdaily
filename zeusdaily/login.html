<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Daily · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Rajdhani:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf8f4;
    --gold: #b8964a;
    --gold-dark: #8a6d2f;
    --purple: #5c3d8f;
    --dark: #1a1408;
    --card-bg: #f5f1e8;
  }

  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    position: relative;
    overflow: hidden;
  }

  /* subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* top gold line */
  .top-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent);
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 24px;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-lightning {
    color: var(--gold);
    font-size: 1.1rem;
    letter-spacing: 0.2em;
  }

  .brand-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.6rem;
    color: var(--gold-dark);
    letter-spacing: 0.08em;
    line-height: 1;
    margin: 4px 0;
  }

  .brand-subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    color: #9a8060;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .brand-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto 0;
  }

  /* Eye SVG */
  .eye-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }

  .eye-svg { cursor: pointer; }

  /* Card */
  .card {
    background: var(--card-bg);
    border: 1px solid rgba(184,150,74,0.25);
    border-radius: 2px;
    padding: 36px 36px 32px;
    box-shadow: 0 8px 40px rgba(26,20,8,0.08), 0 1px 0 rgba(184,150,74,0.2) inset;
  }

  .card-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8a7050;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(184,150,74,0.3);
    border-radius: 1px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .field input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.9);
  }

  .field input::placeholder { color: #c0aa88; }

  .tabs {
    display: flex;
    border-bottom: 1px solid rgba(184,150,74,0.2);
    margin-bottom: 28px;
    gap: 0;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #a08860;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--gold-dark);
    border-bottom-color: var(--gold);
  }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 1px;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--cream);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 1px;
    font-size: 0.85rem;
    text-align: center;
    display: none;
  }

  .msg.error { background: rgba(180,40,40,0.08); color: #a03030; border: 1px solid rgba(180,40,40,0.2); display: block; }
  .msg.success { background: rgba(40,140,40,0.08); color: #286030; border: 1px solid rgba(40,140,40,0.2); display: block; }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 0.78rem;
    color: #b09070;
    font-style: italic;
  }

  /* Register form hidden by default */
  #registerForm { display: none; }
</style>
</head>
<body>
<div class="top-line"></div>

<div class="container">
  <!-- Brand Header -->
  <div class="brand">
    <div class="brand-lightning">⚡ ZEUS DAILY ⚡</div>
    <div class="brand-title">THE GOD'S EYE</div>
    <div class="brand-subtitle">Member Portal</div>
    <div class="brand-divider"></div>
  </div>

  <!-- Eye -->
  <div class="eye-wrap">
    <svg class="eye-svg" id="loginEye" width="120" height="52" viewBox="0 0 120 52" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="liris" cx="50%" cy="45%" r="50%">
          <stop offset="0%" stop-color="#b088f9"/>
          <stop offset="45%" stop-color="#6b4c9a"/>
          <stop offset="100%" stop-color="#2d1b4e"/>
        </radialGradient>
        <radialGradient id="pupil" cx="50%" cy="45%" r="50%">
          <stop offset="0%" stop-color="#1a0a30"/>
          <stop offset="100%" stop-color="#0d0618"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Outline -->
      <path id="eyeOutline" d="M 10 26 Q 60 4 110 26 Q 60 48 10 26 Z" fill="none" stroke="#b8964a" stroke-width="1.2" filter="url(#glow)"/>
      <!-- Iris -->
      <circle cx="60" cy="26" r="14" fill="url(#lirus)"/>
      <circle cx="60" cy="26" r="14" fill="url(#lris)">
        <defs>
          <radialGradient id="lris" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#b088f9"/>
            <stop offset="45%" stop-color="#6b4c9a"/>
            <stop offset="100%" stop-color="#2d1b4e"/>
          </radialGradient>
        </defs>
      </circle>
      <!-- Pupil -->
      <circle cx="60" cy="26" r="7" fill="url(#pupil)"/>
      <!-- Highlight -->
      <circle cx="64" cy="22" r="2.5" fill="rgba(255,255,255,0.55)"/>
      <circle cx="57" cy="28" r="1" fill="rgba(255,255,255,0.25)"/>
    </svg>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">登入</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register')">注册</div>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="field">
        <label>电子邮件</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">进入神之视界</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm">
      <div class="field">
        <label>电子邮件</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>密码（至少6位）</label>
        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn" id="registerBtn" onclick="doRegister()">创建账号</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <div class="footer-note">A Zeus 9 Publication · zeus9.ai</div>
</div>

<script>
var SUPABASE_URL = 'https://ruuksrwlgsenkkkkaapbu.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dWtzcndsZ3Nlbmtra2thcGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc3MjksImV4cCI6MjA4ODgwMzcyOX0.95Vne7MuFGp7rjR0Xsur-9sRH10BBeheCxvksWbbpLw';
var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
client.auth.getSession().then(function(result) {
  if (result.data && result.data.session) {
    window.location.href = 'dashboard.html';
  }
});

function switchTab(tab) {
  if (tab === 'login') {
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('loginForm').style.display = '';
    document.getElementById('registerForm').style.display = 'none';
  } else {
    document.getElementById('tabRegister').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('registerForm').style.display = '';
    document.getElementById('loginForm').style.display = 'none';
  }
  showMsg('', '');
}

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email || !password) { showMsg('请填写邮件和密码', 'error'); return; }
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '验证中...';
  client.auth.signInWithPassword({ email: email, password: password }).then(function(result) {
    if (result.error) {
      showMsg(result.error.message === 'Invalid login credentials' ? '邮件或密码错误' : result.error.message, 'error');
      btn.disabled = false;
      btn.textContent = '进入神之视界';
    } else {
      showMsg('登入成功，跳转中...', 'success');
      setTimeout(function() { window.location.href = 'dashboard.html'; }, 800);
    }
  });
}

function doRegister() {
  var email = document.getElementById('regEmail').value.trim();
  var password = document.getElementById('regPassword').value;
  if (!email || !password) { showMsg('请填写邮件和密码', 'error'); return; }
  if (password.length < 6) { showMsg('密码至少需要6位', 'error'); return; }
  var btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = '注册中...';
  client.auth.signUp({ email: email, password: password }).then(function(result) {
    if (result.error) {
      showMsg(result.error.message, 'error');
      btn.disabled = false;
      btn.textContent = '创建账号';
    } else {
      showMsg('注册成功！请检查邮件验证（或直接登入）', 'success');
      setTimeout(function() { switchTab('login'); btn.disabled = false; btn.textContent = '创建账号'; }, 2000);
    }
  });
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var loginVisible = document.getElementById('loginForm').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  }
});

// Eye blink animation
var eye = document.getElementById('loginEye');
function blink() {
  var outline = document.getElementById('eyeOutline');
  outline.setAttribute('d', 'M 10 26 Q 60 22 110 26 Q 60 30 10 26 Z');
  setTimeout(function() {
    outline.setAttribute('d', 'M 10 26 Q 60 4 110 26 Q 60 48 10 26 Z');
  }, 120);
}
setInterval(blink, 3200);
</script>
</body>
</html>
