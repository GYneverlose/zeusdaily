<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Daily · Badge Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5eedc;
  --bg2:#faf8f4;
  --parchment:#ede4ce;
  --gold:#b8964a;--gold2:#d4ac5c;--gold-dark:#8a6d2f;
  --violet:#5c3d8f;--violet2:#7b56b8;
  --text:#1e1530;--text2:#4a3a6a;--text3:#8a7a9a;--text4:#b8a8c8;
  --border:rgba(184,150,74,0.2);--border2:rgba(184,150,74,0.35);
  --shadow-sm:0 2px 12px rgba(30,21,48,0.07);
  --shadow-md:0 8px 32px rgba(30,21,48,0.10);
  --shadow-lg:0 20px 60px rgba(30,21,48,0.13);
}

html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* ── BACKGROUND TEXTURE ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%, rgba(184,150,74,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%, rgba(92,61,143,0.06) 0%, transparent 55%),
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,255,255,0.5) 0%, transparent 70%);
}
/* Subtle linen weave */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  opacity:0.018;
  background-image:repeating-linear-gradient(0deg,#b8964a 0px,transparent 1px,transparent 4px),
                   repeating-linear-gradient(90deg,#b8964a 0px,transparent 1px,transparent 4px);
  background-size:4px 4px;
}

.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:56px 28px 100px;}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:56px;}
.header-rule{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.header-rule-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.header-rule-ornament{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:4px;color:var(--gold);white-space:nowrap;}
.header-title{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,52px);font-weight:900;line-height:1.05;color:var(--text);margin-bottom:10px;letter-spacing:-0.5px;}
.header-title em{font-style:italic;color:var(--gold);}
.header-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3.5px;color:var(--text3);text-transform:uppercase;}

/* ── STAT RIBBON ── */
.stat-ribbon{
  display:flex;align-items:stretch;
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-sm);
  margin-bottom:48px;
  overflow:hidden;
}
.stat-cell{flex:1;padding:20px 16px;text-align:center;border-right:1px solid var(--border);position:relative;}
.stat-cell:last-child{border-right:none;}
.stat-cell::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;}
.stat-cell.highlight::before{opacity:1;}
.stat-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--text);line-height:1;}
.stat-val.gold{color:var(--gold);}
.stat-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text4);margin-top:5px;}

/* ── CABINET SECTION ── */
.cabinet-section{margin-bottom:32px;}

/* Cabinet label */
.cab-header{
  display:flex;align-items:center;gap:0;
  margin-bottom:20px;
}
.cab-number{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--gold);
  width:28px;flex-shrink:0;
}
.cab-title-zh{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text2);}
.cab-title-en{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2.5px;color:var(--text4);margin-left:10px;margin-top:2px;}
.cab-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);margin-left:16px;}

/* Cabinet box — glass vitrine */
.cabinet{
  background:white;
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 28px 28px;
  box-shadow:var(--shadow-md);
  position:relative;
  overflow:hidden;
}
/* Subtle inner shadow top */
.cabinet::before{
  content:'';position:absolute;top:0;left:0;right:0;height:80px;
  background:linear-gradient(180deg,rgba(255,255,255,0.9),transparent);
  pointer-events:none;
}
/* Gold top accent line */
.cabinet::after{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.5;
}
/* Bottom glass depth */
.cab-floor{
  position:absolute;bottom:0;left:0;right:0;height:12px;
  background:linear-gradient(0deg,rgba(184,150,74,0.06),transparent);
}

/* Badge grid inside cabinet */
.shelf{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:16px;
}

/* ── BADGE CELL ── */
.badge-cell{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:20px 10px 16px;
  border-radius:14px;
  background:var(--bg2);
  border:1px solid rgba(184,150,74,0.1);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform 0.38s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s, border-color 0.25s, background 0.25s;
  animation:cell-in 0.5s ease both;
}
.badge-cell:hover{
  transform:translateY(-7px) scale(1.02);
  box-shadow:0 16px 40px rgba(30,21,48,0.12), 0 0 0 1px rgba(184,150,74,0.25);
  background:white;
  border-color:rgba(184,150,74,0.3);
}
.badge-cell.locked{
  opacity:0.35;
  filter:grayscale(0.65) brightness(0.95);
}
.badge-cell.locked:hover{transform:none;box-shadow:none;}
.badge-cell.earned{border-color:rgba(184,150,74,0.18);}

/* Hover glow floor */
.badge-cell::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(0deg,var(--cell-glow,rgba(184,150,74,0.06)),transparent);
  opacity:0;transition:opacity 0.35s;
}
.badge-cell:hover::after{opacity:1;}

/* Earned indicator */
.earned-pip{
  position:absolute;top:9px;right:9px;
  width:16px;height:16px;border-radius:50%;
  background:rgba(61,186,122,0.12);border:1px solid rgba(61,186,122,0.35);
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#3dba7a;
}

/* Lock icon */
.lock-pip{
  position:absolute;top:9px;right:9px;
  width:16px;height:16px;border-radius:50%;
  background:rgba(184,150,74,0.08);border:1px solid rgba(184,150,74,0.15);
  display:flex;align-items:center;justify-content:center;
}

/* SVG drop shadow */
.badge-svg-w{
  filter:drop-shadow(0 5px 14px var(--cell-glow,rgba(184,150,74,0.2)));
  transition:filter 0.3s;
}
.badge-cell:hover .badge-svg-w{
  filter:drop-shadow(0 10px 24px var(--cell-glow,rgba(184,150,74,0.4)));
}

/* Pedestal */
.pedestal{
  width:40px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.4;border-radius:1px;
  margin-top:2px;
}

.cell-name{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;}
.cell-en{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1.5px;color:var(--text4);text-align:center;margin-top:-2px;}
.cell-cond{font-size:8.5px;color:var(--text3);text-align:center;line-height:1.5;}
.rarity-tag{
  font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:1.5px;
  padding:2px 6px;border-radius:3px;
  color:var(--rarity-color,var(--text4));
  border:1px solid var(--rarity-color,rgba(184,150,74,0.2));
  background:rgba(255,255,255,0.6);
  margin-top:2px;
}

/* ── DETAIL DRAWER ── */
#panel-backdrop{
  display:none;position:fixed;inset:0;z-index:90;
  background:rgba(30,21,48,0.25);
  backdrop-filter:blur(2px);
}
#panel-backdrop.open{display:block;}

#detail-panel{
  position:fixed;bottom:-100%;left:0;right:0;z-index:100;
  max-width:560px;margin:0 auto;
  background:white;
  border:1px solid var(--border);
  border-top-left-radius:24px;border-top-right-radius:24px;
  padding:8px 28px 48px;
  box-shadow:0 -12px 48px rgba(30,21,48,0.16);
  transition:bottom 0.42s cubic-bezier(.32,1.1,.6,1);
}
#detail-panel.open{bottom:0;}
#detail-panel::before{
  content:'';display:block;width:36px;height:3px;border-radius:2px;
  background:rgba(184,150,74,0.3);margin:14px auto 20px;
}
.detail-inner{display:flex;gap:20px;align-items:flex-start;}
.detail-badge-wrap{flex-shrink:0;}
.detail-info{flex:1;padding-top:4px;}
.detail-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--text);margin-bottom:2px;}
.detail-en{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--text4);margin-bottom:12px;}
.detail-desc{font-size:12px;color:var(--text2);line-height:1.75;margin-bottom:14px;}
.detail-status{
  display:inline-flex;align-items:center;gap:7px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;
  padding:6px 14px;border-radius:20px;
}
.detail-status.earned{background:rgba(61,186,122,0.08);border:1px solid rgba(61,186,122,0.3);color:#2a8a5a;}
.detail-status.locked{background:rgba(184,150,74,0.06);border:1px solid rgba(184,150,74,0.2);color:var(--text3);}
.detail-rarity{
  display:inline-block;margin-left:8px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--rarity-color,var(--border));
  color:var(--rarity-color,var(--text4));
  background:rgba(255,255,255,0.8);
}

/* ── LEGEND ── */
.legend{
  display:flex;gap:24px;justify-content:center;
  margin-top:36px;flex-wrap:wrap;
  padding:16px;
  background:white;border:1px solid var(--border);border-radius:12px;
}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.5px;}
.legend-pip{width:7px;height:7px;border-radius:50%;}

/* ── ANIMATIONS ── */
@keyframes cell-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin-slow{to{transform:rotate(360deg);}}
@keyframes spin-rev{to{transform:rotate(-360deg);}}
@keyframes orbit{to{transform:rotate(360deg);}}
@keyframes shimmer{0%{transform:translateX(-80px);}100%{transform:translateX(80px);}}
@keyframes hue{0%{filter:hue-rotate(0deg) brightness(1.1);}50%{filter:hue-rotate(40deg) brightness(1.25);}100%{filter:hue-rotate(0deg) brightness(1.1);}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1);}}
@keyframes ach-flame{0%,100%{transform:scaleY(1) scaleX(1);}33%{transform:scaleY(1.06) scaleX(0.96);}66%{transform:scaleY(0.97) scaleX(1.03);}}
@keyframes ach-heartbeat{0%,100%{transform:scale(1);}14%{transform:scale(1.1);}28%{transform:scale(1);}42%{transform:scale(1.05);}70%{transform:scale(1);}}
@keyframes ach-hue{0%{filter:hue-rotate(0deg) brightness(1.1);}50%{filter:hue-rotate(40deg) brightness(1.25);}100%{filter:hue-rotate(0deg) brightness(1.1);}}
@keyframes ach-pulse-ring{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:0.65;transform:scale(1.04);}}
@keyframes ach-pulse-glow{0%,100%{opacity:0.4;}50%{opacity:0.9;}}

/* Mobile */
@media(max-width:600px){
  .shelf{grid-template-columns:repeat(3,1fr);gap:10px;}
  .badge-cell{padding:14px 8px 12px;}
  .cabinet{padding:20px 16px 16px;}
  .stat-ribbon{flex-wrap:wrap;}
  .stat-cell{min-width:50%;border-bottom:1px solid var(--border);}
  .stat-cell:nth-child(2){border-right:none;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-rule">
      <div class="header-rule-line"></div>
      <div class="header-rule-ornament">Zeus Daily · Achievement System</div>
      <div class="header-rule-line"></div>
    </div>
    <div class="header-title">成就<em>徽章</em>专柜</div>
    <div class="header-sub">解锁属于你的文明印记 · Unlock Your Civilization Marks</div>
  </div>

  <!-- STAT RIBBON -->
  <div class="stat-ribbon">
    <div class="stat-cell highlight">
      <div class="stat-val gold" id="stat-earned">0</div>
      <div class="stat-lbl">已解锁 · UNLOCKED</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val">12</div>
      <div class="stat-lbl">全部徽章 · TOTAL</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val gold" id="stat-pct">0%</div>
      <div class="stat-lbl">完成度 · PROGRESS</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="stat-rarest" style="font-size:16px;padding-top:6px;">—</div>
      <div class="stat-lbl">最高稀有度 · RAREST</div>
    </div>
  </div>

  <!-- CAT: STREAK -->
  <div class="cabinet-section">
    <div class="cab-header">
      <div class="cab-number">01</div>
      <div class="cab-title-zh">连续签到</div>
      <div class="cab-title-en">STREAK</div>
      <div class="cab-line"></div>
    </div>
    <div class="cabinet">
      <div class="shelf" id="shelf-streak"></div>
      <div class="cab-floor"></div>
    </div>
  </div>

  <!-- CAT: FOUNDING -->
  <div class="cabinet-section">
    <div class="cab-header">
      <div class="cab-number">02</div>
      <div class="cab-title-zh">创始人</div>
      <div class="cab-title-en">FOUNDING</div>
      <div class="cab-line"></div>
    </div>
    <div class="cabinet">
      <div class="shelf" id="shelf-founding"></div>
      <div class="cab-floor"></div>
    </div>
  </div>

  <!-- CAT: SOCIAL -->
  <div class="cabinet-section">
    <div class="cab-header">
      <div class="cab-number">03</div>
      <div class="cab-title-zh">社交影响</div>
      <div class="cab-title-en">SOCIAL</div>
      <div class="cab-line"></div>
    </div>
    <div class="cabinet">
      <div class="shelf" id="shelf-social"></div>
      <div class="cab-floor"></div>
    </div>
  </div>

  <!-- CAT: COLLECTOR -->
  <div class="cabinet-section">
    <div class="cab-header">
      <div class="cab-number">04</div>
      <div class="cab-title-zh">收藏家</div>
      <div class="cab-title-en">COLLECTOR</div>
      <div class="cab-line"></div>
    </div>
    <div class="cabinet">
      <div class="shelf" id="shelf-collector"></div>
      <div class="cab-floor"></div>
    </div>
  </div>

  <!-- CAT: HIDDEN -->
  <div class="cabinet-section">
    <div class="cab-header">
      <div class="cab-number">05</div>
      <div class="cab-title-zh">隐藏成就</div>
      <div class="cab-title-en">HIDDEN</div>
      <div class="cab-line"></div>
    </div>
    <div class="cabinet">
      <div class="shelf" id="shelf-hidden"></div>
      <div class="cab-floor"></div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-pip" style="background:#b8a8c8;"></div>Common</div>
    <div class="legend-item"><div class="legend-pip" style="background:#b8964a;box-shadow:0 0 5px rgba(184,150,74,0.6);"></div>Rare</div>
    <div class="legend-item"><div class="legend-pip" style="background:#7b56b8;box-shadow:0 0 6px rgba(123,86,184,0.5);"></div>Epic</div>
    <div class="legend-item"><div class="legend-pip" style="background:#d4ac5c;box-shadow:0 0 8px rgba(212,172,92,0.7);"></div>Legendary</div>
  </div>

</div>

<!-- DETAIL DRAWER -->
<div id="panel-backdrop" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="detail-inner">
    <div class="detail-badge-wrap" id="detail-badge-svg"></div>
    <div class="detail-info">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-en" id="detail-en"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;">
        <div class="detail-status" id="detail-status"></div>
        <div class="detail-rarity" id="detail-rarity"></div>
      </div>
    </div>
  </div>
</div>

      +'<path d="M34,20 C36,26 39,30 37,37 C35,43 32,45 32,45 C34,41 35,37 32,33 C30,29 34,20 34,20Z" fill="#ff7070" opacity="0.7"/>'

  streak7:       {zh:'初燃',     en:'First Spark',    desc_zh:'连续签到 7 天，火焰初燃',              rarity:'rare',      rc:'#b8964a', glow:'rgba(255,120,40,0.22)'},
  streak30:      {zh:'不灭之焰', en:'Steady Flame',   desc_zh:'连续签到 30 天，烈焰不熄',             rarity:'epic',      rc:'#7b56b8', glow:'rgba(224,68,68,0.2)'},
  streak100:     {zh:'百日',     en:'Century',         desc_zh:'连续签到 100 天，晨曦永照',            rarity:'legendary', rc:'#d4ac5c', glow:'rgba(123,86,184,0.22)'},
  genesis:       {zh:'创世纪',   en:'Genesis',         desc_zh:'前 100 名注册用户，见证黎明',           rarity:'legendary', rc:'#d4ac5c', glow:'rgba(212,172,92,0.28)'},
  pioneer:       {zh:'先行者',   en:'Pioneer',         desc_zh:'Beta 测试阶段注册，携带天命',           rarity:'rare',      rc:'#b8964a', glow:'rgba(184,150,74,0.22)'},
  invite1:       {zh:'引路人',   en:'First Invite',    desc_zh:'邀请第一位好友加入神域',               rarity:'common',    rc:'#b8a8c8', glow:'rgba(61,186,122,0.2)'},
  invite5:       {zh:'布道者',   en:'Evangelist',      desc_zh:'邀请 5 位好友，散播神谕',              rarity:'rare',      rc:'#b8964a', glow:'rgba(61,186,122,0.22)'},
  invite10:      {zh:'神使',     en:'Divine Herald',   desc_zh:'邀请 10 位好友，成为神之使者',         rarity:'epic',      rc:'#7b56b8', glow:'rgba(155,114,212,0.25)'},
  collect1:      {zh:'初藏',     en:'First Relic',     desc_zh:'收藏第一期日报，珍存神迹',             rarity:'common',    rc:'#b8a8c8', glow:'rgba(184,150,74,0.18)'},
  collect_legend:{zh:'传说藏家', en:'Legend Keeper',   desc_zh:'收藏一期传说版日报，触碰永恒',         rarity:'legendary', rc:'#d4ac5c', glow:'rgba(212,172,92,0.28)'},
  night_owl:     {zh:'夜枭',     en:'Night Owl',       desc_zh:'凌晨 0–4 时签到，与暗夜共舞',         rarity:'rare',      rc:'#b8964a', glow:'rgba(60,80,200,0.2)'},
  silent_god:    {zh:'沉默的神', en:'Silent God',      desc_zh:'失联 7 天后重新回归，虚空归来',        rarity:'epic',      rc:'#7b56b8', glow:'rgba(80,80,80,0.18)'}
};

function getEarned() {
  var earned = {};
  try {
    var p = JSON.parse(localStorage.getItem('zeus-profile') || 'null');
    if (p) {
      if ((p.streak||0) >= 7)   earned['streak7'] = true;
      if ((p.streak||0) >= 30)  earned['streak30'] = true;
      if ((p.streak||0) >= 100) earned['streak100'] = true;
    }
  } catch(e) {}
  earned['pioneer'] = true;
  return earned;
}

var RARITY_LABEL = {common:'Common', rare:'Rare', epic:'Epic', legendary:'Legendary'};
var RARITY_ORDER = {common:1, rare:2, epic:3, legendary:4};

var _earned = getEarned();
var _earnedCount = Object.keys(_earned).length;

function buildCell(id, delay) {
  var m = ACH_META[id];
  var isEarned = !!_earned[id];
  var svg = window._achBadge ? window._achBadge(id, 60) : '';
  return '<div class="badge-cell ' + (isEarned?'earned':'locked') + '" '
    + 'style="--cell-glow:' + m.glow + ';animation-delay:' + (delay*70) + 'ms;" '
    + 'onclick="openDetail(\'' + id + '\')">'
    + (isEarned
      ? '<div class="earned-pip">✓</div>'
      : '<div class="lock-pip"><svg width="8" height="10" viewBox="0 0 8 10" fill="none"><rect x="1" y="4.5" width="6" height="5" rx="1" stroke="#b8964a" stroke-width="1.1" opacity="0.7"/><path d="M2.5 4.5V3A1.5 1.5 0 015.5 3v1.5" stroke="#b8964a" stroke-width="1.1" opacity="0.7"/></svg></div>')
    + '<div class="badge-svg-w">' + svg + '</div>'
    + '<div class="pedestal"></div>'
    + '<div class="cell-name">' + m.zh + '</div>'
    + '<div class="cell-en">' + m.en + '</div>'
    + '<div class="cell-cond">' + m.desc_zh + '</div>'
    + '<div class="rarity-tag" style="--rarity-color:' + m.rc + ';">' + RARITY_LABEL[m.rarity] + '</div>'
    + '</div>';
}

Object.keys(ACH_CATS).forEach(function(cat) {
  var el = document.getElementById('shelf-' + cat);
  if (!el) return;
  el.innerHTML = ACH_CATS[cat].map(function(id, i){ return buildCell(id, i); }).join('');
});

// Stats
document.getElementById('stat-earned').textContent = _earnedCount;
document.getElementById('stat-pct').textContent = Math.round(_earnedCount/12*100) + '%';
var highRarity = 'common';
Object.keys(_earned).forEach(function(id){
  if (ACH_META[id] && RARITY_ORDER[ACH_META[id].rarity] > RARITY_ORDER[highRarity]) highRarity = ACH_META[id].rarity;
});
document.getElementById('stat-rarest').textContent = RARITY_LABEL[highRarity] || '—';

// ── DETAIL ──
function openDetail(id) {
  var m = ACH_META[id];
  var isEarned = !!_earned[id];
  document.getElementById('detail-badge-svg').innerHTML = window._achBadge ? window._achBadge(id, 84) : '';
  document.getElementById('detail-name').textContent = m.zh;
  document.getElementById('detail-en').textContent = m.en.toUpperCase();
  document.getElementById('detail-desc').textContent = m.desc_zh;
  var st = document.getElementById('detail-status');
  st.className = 'detail-status ' + (isEarned ? 'earned' : 'locked');
  st.textContent = isEarned ? '✓ 已解锁' : '🔒 未解锁 · ' + m.desc_zh;
  var rt = document.getElementById('detail-rarity');
  rt.textContent = RARITY_LABEL[m.rarity];
  rt.style.setProperty('--rarity-color', m.rc);
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('open');
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDetail(); });
</script>
</body>
</html>
