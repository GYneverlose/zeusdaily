<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#03010a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#b8964a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8964a"/>
      <stop offset="50%" stop-color="#5c3d8f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="256" cy="230" rx="180" ry="80" fill="url(#glow)"/>
  <!-- Eye outer -->
  <ellipse cx="256" cy="230" rx="140" ry="60" fill="none" stroke="#b8964a" stroke-width="3" opacity="0.7"/>
  <!-- Eye fill -->
  <ellipse cx="256" cy="230" rx="138" ry="58" fill="rgba(184,150,74,0.06)"/>
  <!-- Iris -->
  <circle cx="256" cy="230" r="36" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="256" cy="230" r="10" fill="#fff" opacity="0.9"/>
  <!-- Pupil highlight -->
  <circle cx="262" cy="224" r="4" fill="#fff"/>
  <!-- ZEUS text -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="48" letter-spacing="16" fill="#b8964a" opacity="0.85">ZEUS</text>
  <!-- DAILY text -->
  <text x="256" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="18" letter-spacing="8" fill="rgba(184,150,74,0.5)">DAILY</text>
  <!-- Decorative lines -->
  <line x1="100" y1="390" x2="210" y2="390" stroke="#b8964a" stroke-width="1" opacity="0.25"/>
  <line x1="302" y1="390" x2="412" y2="390" stroke="#b8964a" stroke-width="1" opacity="0.25"/>
</svg>
