<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Daily · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf8f4;
    --gold: #b8964a;
    --gold-dark: #8a6d2f;
    --purple: #5c3d8f;
    --dark: #1a1408;
    --card: #f5f1e8;
    --border: rgba(184,150,74,0.22);
  }

  body {
    background: var(--cream);
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    color: var(--dark);
  }

  /* Top bar */
  .topbar {
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(184,150,74,0.3);
  }

  .topbar-brand {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.15em;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .topbar-email {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #9a8060;
  }

  .logout-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8a7050;
    background: none;
    border: 1px solid rgba(184,150,74,0.3);
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
  }
  .logout-btn:hover { color: var(--gold); border-color: var(--gold); }

  /* Main layout */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Welcome header */
  .welcome-section {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-eye {
    margin-bottom: 16px;
  }

  .welcome-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--gold-dark);
    letter-spacing: 0.05em;
  }

  .welcome-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #9a8060;
    margin-top: 6px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold-dark);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #9a8060;
    margin-top: 6px;
  }

  /* Level badge */
  .level-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    font-weight: 500;
    margin-top: 8px;
  }

  .level-1 { background: rgba(80,120,180,0.12); color: #4a78b8; border: 1px solid rgba(80,120,180,0.3); }
  .level-2 { background: rgba(92,61,143,0.12); color: var(--purple); border: 1px solid rgba(92,61,143,0.3); }
  .level-3 { background: linear-gradient(135deg,rgba(92,61,143,0.12),rgba(184,150,74,0.12)); color: #7a5aaf; border: 1px solid rgba(140,100,160,0.3); }
  .level-4 { background: rgba(184,150,74,0.12); color: var(--gold-dark); border: 1px solid rgba(184,150,74,0.35); }
  .level-5 { background: linear-gradient(135deg,rgba(184,150,74,0.15),rgba(200,160,220,0.15)); color: #9060c0; border: 1px solid rgba(180,140,200,0.4); }

  /* Check-in section */
  .checkin-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .checkin-info h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold-dark);
    font-weight: 700;
  }

  .checkin-info p {
    font-size: 0.85rem;
    color: #8a7050;
    margin-top: 4px;
    font-style: italic;
  }

  .checkin-btn {
    flex-shrink: 0;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none;
    border-radius: 1px;
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--cream);
    cursor: pointer;
    transition: opacity 0.2s;
    position: relative;
  }
  .checkin-btn:hover { opacity: 0.88; }
  .checkin-btn:disabled { background: #c8b890; cursor: not-allowed; }
  .checkin-btn.done { background: linear-gradient(135deg, #5a9060, #3d6b44); }

  /* Editions list */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold-dark);
    letter-spacing: 0.05em;
  }

  .section-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #aaa090;
  }

  .editions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    animation: fadeUp 0.6s ease 0.35s both;
  }

  .edition-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    cursor: pointer;
  }

  .edition-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(26,20,8,0.1);
  }

  .edition-vol {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 8px;
  }

  .edition-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold-dark);
  }

  .edition-arrow {
    float: right;
    color: var(--gold);
    font-size: 1.1rem;
    margin-top: -2px;
  }

  .edition-preview {
    font-size: 0.82rem;
    color: #8a7050;
    margin-top: 8px;
    font-style: italic;
    line-height: 1.4;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #b0a080;
    font-style: italic;
  }

  /* Loading */
  .loading-text {
    text-align: center;
    padding: 40px;
    color: #b0a080;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Gold top line */
  .top-line {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-dark), var(--gold), transparent);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: var(--gold);
    padding: 12px 28px;
    border-radius: 2px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid rgba(184,150,74,0.3);
    transition: transform 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .checkin-section { flex-direction: column; text-align: center; }
    .topbar { padding: 0 16px; }
    .main { padding: 24px 16px 60px; }
  }
</style>
</head>
<body>

<div class="top-line"></div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">⚡ ZEUS DAILY</div>
  <div class="topbar-right">
    <div class="topbar-email" id="userEmail">—</div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Welcome -->
  <div class="welcome-section">
    <div class="welcome-eye">
      <svg id="dashEye" width="90" height="39" viewBox="0 0 120 52" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="iris2" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#b088f9"/>
            <stop offset="45%" stop-color="#6b4c9a"/>
            <stop offset="100%" stop-color="#2d1b4e"/>
          </radialGradient>
          <radialGradient id="pupil2" cx="50%" cy="45%" r="50%">
            <stop offset="0%" stop-color="#1a0a30"/>
            <stop offset="100%" stop-color="#0d0618"/>
          </radialGradient>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path id="dashEyeOutline" d="M 10 26 Q 60 4 110 26 Q 60 48 10 26 Z" fill="none" stroke="#b8964a" stroke-width="1.2" filter="url(#glow2)"/>
        <circle cx="60" cy="26" r="14" fill="url(#iris2)"/>
        <circle cx="60" cy="26" r="7" fill="url(#pupil2)"/>
        <circle cx="64" cy="22" r="2.5" fill="rgba(255,255,255,0.55)"/>
        <circle cx="57" cy="28" r="1" fill="rgba(255,255,255,0.25)"/>
      </svg>
    </div>
    <div class="welcome-title">欢迎回来，观察者</div>
    <div class="welcome-sub">The God's Eye View · Member Dashboard</div>
    <div id="levelBadge" style="margin-top:10px;"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statDays">—</div>
      <div class="stat-label">订阅天数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statCheckins">—</div>
      <div class="stat-label">累计打卡</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statStreak">—</div>
      <div class="stat-label">连续打卡</div>
    </div>
  </div>

  <!-- Check-in -->
  <div class="checkin-section">
    <div class="checkin-info">
      <h3>⚡ 每日打卡</h3>
      <p id="checkinStatus">加载中...</p>
    </div>
    <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()" disabled>打卡中...</button>
  </div>

  <!-- Editions -->
  <div class="section-header">
    <div class="section-title">历期日报</div>
    <div class="section-label" id="editionCount">加载中</div>
  </div>
  <div class="editions-grid" id="editionsGrid">
    <div class="loading-text">正在加载期数...</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://ruuksrwlgsenkkkkaapbu.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dWtzcndsZ3Nlbmtra2thcGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc3MjksImV4cCI6MjA4ODgwMzcyOX0.95Vne7MuFGp7rjR0Xsur-9sRH10BBeheCxvksWbbpLw';
var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var todayChecked = false;

// Auth guard
client.auth.getSession().then(function(result) {
  if (!result.data || !result.data.session) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = result.data.session.user;
  document.getElementById('userEmail').textContent = currentUser.email;
  initDashboard();
});

function initDashboard() {
  loadEditions();
  loadUserStats();
  checkTodayCheckin();
  startEyeBlink();
}

// Level system
function getLevel(days) {
  if (days >= 365) return { num: 5, name: 'Creator', cls: 'level-5', icon: '✦' };
  if (days >= 180) return { num: 4, name: 'Sage', cls: 'level-4', icon: '◈' };
  if (days >= 90)  return { num: 3, name: 'Prophet', cls: 'level-3', icon: '◇' };
  if (days >= 30)  return { num: 2, name: 'Scholar', cls: 'level-2', icon: '○' };
  return { num: 1, name: 'Observer', cls: 'level-1', icon: '·' };
}

function loadUserStats() {
  var created = new Date(currentUser.created_at);
  var now = new Date();
  var days = Math.floor((now - created) / (1000 * 60 * 60 * 24));
  document.getElementById('statDays').textContent = days;

  var level = getLevel(days);
  var badge = document.getElementById('levelBadge');
  badge.innerHTML = '<span class="level-badge ' + level.cls + '">' + level.icon + ' Lv.' + level.num + ' ' + level.name + '</span>';

  // Load checkin count from Supabase
  client.from('checkins').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).then(function(res) {
    var total = res.count || 0;
    document.getElementById('statCheckins').textContent = total;
  });

  // Streak (simple: load recent checkins)
  client.from('checkins').select('checked_at').eq('user_id', currentUser.id).order('checked_at', { ascending: false }).limit(60).then(function(res) {
    var streak = 0;
    if (res.data && res.data.length > 0) {
      var check = new Date();
      check.setHours(0,0,0,0);
      for (var i = 0; i < res.data.length; i++) {
        var d = new Date(res.data[i].checked_at);
        d.setHours(0,0,0,0);
        if (d.getTime() === check.getTime()) {
          streak++;
          check.setDate(check.getDate() - 1);
        } else {
          break;
        }
      }
    }
    document.getElementById('statStreak').textContent = streak;
  });
}

function checkTodayCheckin() {
  var today = new Date().toISOString().slice(0, 10);
  client.from('checkins').select('id').eq('user_id', currentUser.id).gte('checked_at', today + 'T00:00:00').lt('checked_at', today + 'T23:59:59').then(function(res) {
    if (res.data && res.data.length > 0) {
      todayChecked = true;
      setCheckinDone();
    } else {
      var btn = document.getElementById('checkinBtn');
      btn.disabled = false;
      btn.textContent = '今日打卡 ⚡';
      document.getElementById('checkinStatus').textContent = '今日尚未打卡，点击记录你的神之视界';
    }
  });
}

function setCheckinDone() {
  var btn = document.getElementById('checkinBtn');
  btn.disabled = true;
  btn.classList.add('done');
  btn.textContent = '✓ 今日已打卡';
  document.getElementById('checkinStatus').textContent = '今日打卡完成。明日再见，观察者。';
}

function doCheckin() {
  if (todayChecked) return;
  var btn = document.getElementById('checkinBtn');
  btn.disabled = true;
  btn.textContent = '记录中...';
  client.from('checkins').insert({ user_id: currentUser.id, checked_at: new Date().toISOString() }).then(function(res) {
    if (res.error) {
      showToast('打卡失败：' + res.error.message);
      btn.disabled = false;
      btn.textContent = '今日打卡 ⚡';
    } else {
      todayChecked = true;
      setCheckinDone();
      loadUserStats();
      showToast('⚡ 打卡成功！神之视界已记录');
    }
  });
}

function loadEditions() {
  // Load from editions.json in same folder
  fetch('editions.json').then(function(r) { return r.json(); }).then(function(data) {
    var editions = data;
    if (!Array.isArray(editions)) editions = [];
    // Sort by date desc
    editions.sort(function(a, b) { return b.date > a.date ? 1 : -1; });
    renderEditions(editions);
  }).catch(function() {
    // Fallback: scan known files
    var fallback = [
      { vol: 'Vol.003', date: '2026-03-12', file: 'zeus-daily-20260312.html' },
      { vol: 'Vol.002', date: '2026-03-11', file: 'zeus-daily-20260311.html' }
    ];
    renderEditions(fallback);
  });
}

function renderEditions(editions) {
  var grid = document.getElementById('editionsGrid');
  document.getElementById('editionCount').textContent = editions.length + ' 期';
  if (editions.length === 0) {
    grid.innerHTML = '<div class="empty">尚无已发布期数</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < editions.length; i++) {
    var e = editions[i];
    var vol = e.vol || ('Vol.' + String(i + 1).padStart(3, '0'));
    var file = e.file || ('zeus-daily-' + e.date.replace(/-/g, '') + '.html');
    html += '<a class="edition-card" href="' + file + '">';
    html += '<div class="edition-vol">' + vol + '<span class="edition-arrow">→</span></div>';
    html += '<div class="edition-date">' + e.date + '</div>';
    if (e.preview) html += '<div class="edition-preview">' + e.preview + '</div>';
    html += '</a>';
  }
  grid.innerHTML = html;
}

function doLogout() {
  client.auth.signOut().then(function() {
    window.location.href = 'login.html';
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function startEyeBlink() {
  function blink() {
    var outline = document.getElementById('dashEyeOutline');
    if (!outline) return;
    outline.setAttribute('d', 'M 10 26 Q 60 22 110 26 Q 60 30 10 26 Z');
    setTimeout(function() {
      outline.setAttribute('d', 'M 10 26 Q 60 4 110 26 Q 60 48 10 26 Z');
    }, 120);
  }
  setInterval(blink, 3500);
}
</script>
</body>
</html>
