<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a2e">
<title>Zeus Daily · Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#03010a;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;}
.eye{width:120px;height:52px;margin-bottom:28px;position:relative;}
.eye-outer{width:120px;height:52px;border:2px solid rgba(184,150,74,0.5);border-radius:50%;position:absolute;top:0;left:0;}
.eye-inner{width:28px;height:28px;background:radial-gradient(circle,#b8964a 30%,#5c3d8f 70%,transparent 100%);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.eye-dot{width:6px;height:6px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
h1{font-size:18px;letter-spacing:6px;color:rgba(184,150,74,0.85);margin-bottom:12px;font-weight:400;}
p{font-size:14px;color:rgba(255,255,255,0.45);line-height:1.6;max-width:280px;margin-bottom:24px;}
.btn{display:inline-block;padding:10px 28px;border:1px solid rgba(184,150,74,0.4);border-radius:6px;color:rgba(184,150,74,0.8);font-size:12px;letter-spacing:2px;text-decoration:none;cursor:pointer;background:none;transition:all 0.2s;}
.btn:hover{background:rgba(184,150,74,0.1);border-color:rgba(184,150,74,0.6);}
</style>
</head>
<body>
<div class="wrap">
  <div class="eye">
    <div class="eye-outer"></div>
    <div class="eye-inner"><div class="eye-dot"></div></div>
  </div>
  <h1>OFFLINE</h1>
  <p>The God's Eye rests while you are disconnected.<br>已缓存的日报仍可离线阅读。</p>
  <button class="btn" onclick="location.reload()">RETRY · 重试</button>
</div>
</body>
</html>
